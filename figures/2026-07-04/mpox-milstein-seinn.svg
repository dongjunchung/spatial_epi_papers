<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Milstein stochastic epidemiologically informed neural network for Mpox</title>
  <desc id="desc">Six-panel schematic showing Mpox time-series inputs, SIRD epidemiological constraints, epidemiologically informed neural network fitting, Milstein stochastic differential update, noise-robust evaluation, and decision outputs.</desc>
  <defs>
    <style>
      .bg{fill:#f9f8fb}.panel{fill:#fff;stroke:#9f97ad;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#2d2738}.t{font:14px Arial,sans-serif;fill:#332d3d}.s{font:12px Arial,sans-serif;fill:#60586c}.eq{font:13px Consolas,monospace;fill:#332d3d}.arrow{stroke:#6d5b8d;stroke-width:2;fill:none;marker-end:url(#arrow)}.n{fill:#d9d2e9;stroke:#6e5a9a}.state{fill:#cfe2f3;stroke:#4f7fa0}.noise{fill:#fce5cd;stroke:#b36b28}.out{fill:#d9ead3;stroke:#5b8c54}.line{stroke:#6d5b8d;stroke-width:3;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#6d5b8d"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">Reported details: SIRD-based EINN extended to Milstein stochastic EINN for Mpox; exact architecture notation is explanatory.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. Epidemic observations</text>
  <path class="line" d="M70 220 H340 M86 220 V145"/>
  <path d="M92 212 C130 204,145 184,175 178 C210 170,235 150,270 142 C295 136,320 156,335 170" fill="none" stroke="#c65c5c" stroke-width="4"/>
  <text x="96" y="142" class="s">Mpox cases</text>
  <text x="120" y="246" class="s">training and out-of-sample time windows</text>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. SIRD constraint layer</text>
  <rect class="state" x="452" y="150" width="54" height="42" rx="5"/><text x="472" y="176" class="t">S</text>
  <rect class="state" x="532" y="150" width="54" height="42" rx="5"/><text x="552" y="176" class="t">I</text>
  <rect class="state" x="612" y="126" width="54" height="42" rx="5"/><text x="632" y="152" class="t">R</text>
  <rect class="state" x="612" y="196" width="54" height="42" rx="5"/><text x="632" y="222" class="t">D</text>
  <path class="arrow" d="M506 171 L530 171"/><path class="arrow" d="M586 164 L610 150"/><path class="arrow" d="M586 178 L610 210"/>
  <text x="448" y="255" class="eq">dX/dt = f_SIRD(X, theta)</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. EINN fitting</text>
  <circle class="n" cx="875" cy="155" r="16"/><circle class="n" cx="875" cy="205" r="16"/>
  <circle class="n" cx="955" cy="135" r="16"/><circle class="n" cx="955" cy="180" r="16"/><circle class="n" cx="955" cy="225" r="16"/>
  <circle class="n" cx="1035" cy="180" r="16"/>
  <path class="arrow" d="M891 155 L939 135"/><path class="arrow" d="M891 155 L939 180"/><path class="arrow" d="M891 205 L939 180"/><path class="arrow" d="M971 180 L1019 180"/>
  <text x="830" y="254" class="eq">loss = data error + epidemic residuals</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Milstein stochastic update</text>
  <text x="60" y="372" class="eq">dX = f(X,t)dt + g(X,t)dW_t</text>
  <text x="60" y="405" class="eq">X_{k+1} = X_k + f dt + g dW</text>
  <text x="60" y="431" class="eq">          + 0.5 g g'((dW)^2 - dt)</text>
  <rect class="noise" x="250" y="354" width="92" height="78" rx="6"/><text x="270" y="386" class="s">process</text><text x="276" y="406" class="s">noise</text>
  <text x="58" y="468" class="s">The Milstein term is the reported stochastic extension beyond Euler SEINN.</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Robustness metrics</text>
  <rect class="out" x="455" y="365" width="110" height="44" rx="6"/><text x="482" y="392" class="s">RMSE</text>
  <rect class="out" x="590" y="365" width="110" height="44" rx="6"/><text x="617" y="392" class="s">MAPE</text>
  <rect class="noise" x="455" y="430" width="245" height="36" rx="6"/><text x="480" y="453" class="s">5% and 10% noise evaluation</text>
  <text x="448" y="350" class="s">Reported: M-SEINN outperformed Euler SEINN and EINN.</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Public-health use</text>
  <rect class="out" x="835" y="370" width="125" height="52" rx="6"/><text x="852" y="400" class="s">parameter estimates</text>
  <rect class="out" x="1000" y="370" width="120" height="52" rx="6"/><text x="1021" y="400" class="s">case forecasts</text>
  <path class="arrow" d="M960 396 L998 396"/>
  <text x="820" y="460" class="s">Noise-aware epidemic learning can support Mpox control decisions.</text>
</svg>
