<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for EpiControl scenario optimization</title>
  <desc id="desc">Six-panel schematic showing routine outbreak data, semi-mechanistic model fitting, feedback-control policy updates, model-based learning, scenario objectives, uncertainty robustness, and Ebola/COVID-19 case-study outputs.</desc>
  <defs>
    <style>
      .bg{fill:#f6fafb}.panel{fill:#fff;stroke:#92a3a7;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#213236}.t{font:14px Arial,sans-serif;fill:#27383c}.s{font:12px Arial,sans-serif;fill:#53686d}.eq{font:13px Consolas,monospace;fill:#27383c}.arrow{stroke:#47737d;stroke-width:2;fill:none;marker-end:url(#arrow)}.data{fill:#cfe2f3;stroke:#4e7ea0}.model{fill:#d9ead3;stroke:#5b8f55}.policy{fill:#f9cb9c;stroke:#a96825}.unc{fill:#ead1dc;stroke:#9b5b7b}.out{fill:#fff2cc;stroke:#a9872b}.line{stroke:#47737d;stroke-width:3;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#47737d"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">Reported details: R tool, semi-mechanistic fits, feedback control and model-based learning, Ebola and COVID-19 case studies. Notation is explanatory.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. Routine response data</text>
  <rect class="data" x="60" y="150" width="110" height="52" rx="6"/><text x="88" y="181" class="t">cases</text>
  <rect class="data" x="215" y="150" width="110" height="52" rx="6"/><text x="234" y="181" class="t">resources</text>
  <path class="arrow" d="M170 176 L213 176"/>
  <text x="58" y="235" class="s">Data streams update as outbreak dynamics unfold.</text>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. Semi-mechanistic fit</text>
  <text x="450" y="153" class="eq">I_t ~ observation model(lambda_t)</text>
  <text x="450" y="184" class="eq">lambda_t = transmission state + intervention effect</text>
  <rect class="model" x="470" y="215" width="220" height="38" rx="6"/><text x="500" y="239" class="s">fast calibration for real-time use</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. Feedback-control loop</text>
  <rect class="model" x="830" y="150" width="105" height="46" rx="6"/><text x="858" y="178" class="s">state</text>
  <rect class="policy" x="1000" y="150" width="115" height="46" rx="6"/><text x="1025" y="178" class="s">policy u_t</text>
  <path class="arrow" d="M935 173 L998 173"/><path class="arrow" d="M1055 198 C1035 250,882 250,878 198"/>
  <text x="832" y="240" class="eq">u_{t+1} = argmin cost subject to target</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Scenario objective</text>
  <path class="line" d="M70 440 H335 M90 440 V360"/>
  <path d="M95 425 C140 390,185 365,245 380 C280 390,305 415,330 430" fill="none" stroke="#c75d45" stroke-width="4"/>
  <line x1="90" y1="385" x2="335" y2="385" stroke="#7a9f65" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="105" y="377" class="s">policy target</text>
  <text x="58" y="466" class="eq">min health loss + societal disruption</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Robustness to surprises</text>
  <rect class="unc" x="455" y="365" width="105" height="46" rx="6"/><text x="475" y="393" class="s">immunity</text>
  <rect class="unc" x="585" y="365" width="105" height="46" rx="6"/><text x="604" y="393" class="s">variants</text>
  <rect class="unc" x="520" y="430" width="105" height="46" rx="6"/><text x="540" y="458" class="s">vaccines</text>
  <text x="448" y="350" class="s">Scenarios update when assumptions are wrong or incomplete.</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Case-study outputs</text>
  <rect class="out" x="835" y="365" width="120" height="50" rx="6"/><text x="867" y="395" class="s">Ebola</text>
  <rect class="out" x="995" y="365" width="120" height="50" rx="6"/><text x="1025" y="395" class="s">COVID-19</text>
  <path class="arrow" d="M955 390 L993 390"/>
  <text x="820" y="452" class="s">Reported outputs include policies to avoid overload and reduce disruption.</text>
</svg>
