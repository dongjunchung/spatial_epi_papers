<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for chikungunya burden and vaccine cost-effectiveness modeling</title>
  <desc id="desc">Six-panel schematic showing country-level chikungunya burden inputs, 2025-2050 projection model, vaccination campaign scenarios, DALY and societal cost outputs, threshold vaccination cost, and policy ranking across endemic settings.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.panel{fill:#fff;stroke:#aaa08d;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#302b22}.t{font:14px Arial,sans-serif;fill:#353026}.s{font:12px Arial,sans-serif;fill:#655d4f}.eq{font:13px Consolas,monospace;fill:#353026}.arrow{stroke:#7a6e44;stroke-width:2;fill:none;marker-end:url(#arrow)}.country{fill:#d9ead3;stroke:#5f8a58}.vax{fill:#cfe2f3;stroke:#4f7fa0}.cost{fill:#ffe599;stroke:#a98425}.burden{fill:#f4cccc;stroke:#a64f4f}.line{stroke:#7a6e44;stroke-width:3;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#7a6e44"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">Reported details: 31 countries, 2025-2050 projections, preventive vaccination scenarios, DALYs and societal costs. Notation is explanatory.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. Country burden inputs</text>
  <rect class="country" x="60" y="150" width="80" height="52" rx="6"/><text x="82" y="181" class="t">c = 1</text>
  <rect class="country" x="165" y="150" width="80" height="52" rx="6"/><text x="187" y="181" class="t">...</text>
  <rect class="country" x="270" y="150" width="80" height="52" rx="6"/><text x="288" y="181" class="t">c = 31</text>
  <text x="58" y="240" class="eq">inputs_c: incidence, costs, DALY weights, demography</text>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. Projection horizon</text>
  <path class="line" d="M460 210 H720 M480 210 V150"/>
  <path d="M485 198 C535 175,590 160,635 175 C675 188,695 170,715 152" fill="none" stroke="#c75c48" stroke-width="4"/>
  <text x="465" y="235" class="s">2025</text><text x="685" y="235" class="s">2050</text>
  <text x="450" y="145" class="s">future burden trajectory</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. Vaccination scenarios</text>
  <rect class="vax" x="835" y="145" width="135" height="46" rx="6"/><text x="855" y="173" class="s">population-wide</text>
  <rect class="vax" x="1000" y="145" width="125" height="46" rx="6"/><text x="1024" y="173" class="s">routine adolescent</text>
  <rect class="vax" x="910" y="210" width="135" height="46" rx="6"/><text x="930" y="238" class="s">combined campaign</text>
  <text x="825" y="132" class="s">Reported example: 5-year 50% age 12+ campaign plus 10-year routine program.</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Health-economic outputs</text>
  <rect class="burden" x="62" y="368" width="120" height="50" rx="6"/><text x="94" y="398" class="s">DALYs</text>
  <rect class="cost" x="220" y="368" width="120" height="50" rx="6"/><text x="253" y="398" class="s">costs</text>
  <text x="58" y="452" class="eq">averted = no_vaccine - scenario</text>
  <text x="58" y="474" class="s">Reported baseline: 5.96M DALYs and $76.5B societal costs projected.</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Threshold vaccination cost</text>
  <text x="450" y="372" class="eq">TVC_c = societal_costs_averted_c / doses_c</text>
  <rect class="cost" x="475" y="405" width="210" height="45" rx="6"/><text x="500" y="433" class="s">country-specific affordability signal</text>
  <text x="448" y="470" class="s">Reported range varied strongly across countries.</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Policy ranking</text>
  <rect class="vax" x="838" y="365" width="145" height="52" rx="6"/><text x="854" y="395" class="s">campaign benefit</text>
  <rect class="country" x="1010" y="365" width="115" height="52" rx="6"/><text x="1028" y="395" class="s">setting priority</text>
  <path class="arrow" d="M983 391 L1008 391"/>
  <text x="820" y="452" class="s">Country-level projections translate disease burden into vaccine deployment priorities.</text>
</svg>
