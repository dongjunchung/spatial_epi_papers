<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian spatial functional clustering with random spanning trees and INLA</title>
  <desc id="desc">Areal time series and adjacency form a graph, a random spanning tree is sampled and cut into contiguous clusters, each cluster has its own latent Gaussian model, INLA supplies marginal likelihoods, and composition-sampling moves update the partition.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>.h{font:700 30px Arial;fill:#172554}.sh{font:700 20px Arial;fill:#1e293b}.tx{font:16px Arial;fill:#334155}.sm{font:14px Arial;fill:#475569}.eq{font:15px 'Courier New';fill:#312e81}.b{stroke-width:2.5}.ar{fill:none;stroke:#475569;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1600" height="980" fill="#f8fafc"/>
  <text x="800" y="48" text-anchor="middle" class="h">Bayesian clustering of contiguous disease-risk trajectories</text>

  <rect x="30" y="82" width="390" height="350" rx="18" fill="#eff6ff" stroke="#2563eb" class="b"/>
  <text x="225" y="118" text-anchor="middle" class="sh">1. Functional areal data</text>
  <g transform="translate(70 155)" stroke="#fff" stroke-width="4">
    <path d="M0 0h80l20 50-22 55H0L-15 48z" fill="#bfdbfe"/><path d="M87 -5h83l25 53-26 55H77l23-53z" fill="#60a5fa"/>
    <path d="M8 110h80l20 55-30 50H-8l8-58z" fill="#dbeafe"/><path d="M95 108h82l20 57-27 51H78l30-51z" fill="#93c5fd"/>
  </g>
  <line x1="285" y1="350" x2="385" y2="350" stroke="#475569" stroke-width="2"/>
  <line x1="285" y1="350" x2="285" y2="220" stroke="#475569" stroke-width="2"/>
  <path d="M285 335C305 320 315 260 335 275C355 290 365 235 385 245" fill="none" stroke="#2563eb" stroke-width="5"/>
  <text x="55" y="395" class="eq">y[i,t], E[i,t], x[i,t], adjacency G</text>
  <path d="M420 255h55" class="ar"/>

  <rect x="475" y="82" width="500" height="350" rx="18" fill="#fefce8" stroke="#ca8a04" class="b"/>
  <text x="725" y="118" text-anchor="middle" class="sh">2. Random spanning-tree partition</text>
  <g transform="translate(525 155)" fill="none" stroke="#64748b" stroke-width="5">
    <path d="M35 40L140 15L215 65L310 30L395 85M35 40L65 155L180 145L215 65M180 145L285 175L395 85"/>
    <path d="M140 15L180 145M310 30L285 175" stroke="#dc2626" stroke-width="7" stroke-dasharray="12 7"/>
  </g>
  <g transform="translate(525 155)" stroke="#fff" stroke-width="3">
    <circle cx="35" cy="40" r="20" fill="#2563eb"/><circle cx="140" cy="15" r="20" fill="#2563eb"/><circle cx="65" cy="155" r="20" fill="#2563eb"/>
    <circle cx="180" cy="145" r="20" fill="#16a34a"/><circle cx="215" cy="65" r="20" fill="#16a34a"/><circle cx="285" cy="175" r="20" fill="#f59e0b"/>
    <circle cx="310" cy="30" r="20" fill="#f59e0b"/><circle cx="395" cy="85" r="20" fill="#f59e0b"/>
  </g>
  <text x="520" y="382" class="eq">T ~ UniformSpanningTree(G)</text>
  <text x="520" y="408" class="eq">partition pi = connected components after edge cuts</text>
  <path d="M975 255h55" class="ar"/>

  <rect x="1030" y="82" width="540" height="350" rx="18" fill="#eef2ff" stroke="#4f46e5" class="b"/>
  <text x="1300" y="118" text-anchor="middle" class="sh">3. Cluster-specific latent Gaussian models</text>
  <text x="1065" y="163" class="eq">y[i,t] | eta[c,t] ~ ExponentialFamily(mu[i,t])</text>
  <text x="1065" y="198" class="eq">g(mu[i,t]) = offset[i,t] + X[i,t] beta[c]</text>
  <text x="1065" y="233" class="eq">               + z[c,t] + u[i]</text>
  <text x="1065" y="275" class="tx">Each cluster c may have its own:</text>
  <text x="1090" y="307" class="tx">- regression coefficients and temporal curve</text>
  <text x="1090" y="338" class="tx">- precision and hyperparameters</text>
  <text x="1090" y="369" class="tx">- Gaussian, Poisson, or other likelihood</text>
  <text x="1090" y="402" class="sm">Latent field remains compatible with R-INLA</text>
  <path d="M800 432v55" class="ar"/>

  <rect x="115" y="490" width="640" height="245" rx="18" fill="#faf5ff" stroke="#7c3aed" class="b"/>
  <text x="435" y="527" text-anchor="middle" class="sh">4. INLA-integrated partition score</text>
  <text x="150" y="574" class="eq">p(y | pi) = product_c integral p(y[c]|theta[c])</text>
  <text x="150" y="607" class="eq">                              p(theta[c]) dtheta[c]</text>
  <rect x="150" y="640" width="245" height="58" rx="10" fill="#ede9fe"/>
  <text x="272" y="676" text-anchor="middle" class="tx">INLA marginal likelihood</text>
  <path d="M395 669h70" class="ar"/>
  <rect x="470" y="640" width="245" height="58" rx="10" fill="#ede9fe"/>
  <text x="592" y="676" text-anchor="middle" class="tx">Partition acceptance ratio</text>

  <rect x="845" y="490" width="640" height="245" rx="18" fill="#fff7ed" stroke="#ea580c" class="b"/>
  <text x="1165" y="527" text-anchor="middle" class="sh">5. Composition-sampling moves</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="890" y="570" width="150" height="60" rx="10" fill="#ffedd5"/><text x="965" y="607" class="tx">Split cluster</text>
    <rect x="1088" y="570" width="150" height="60" rx="10" fill="#ffedd5"/><text x="1163" y="607" class="tx">Merge clusters</text>
    <rect x="1285" y="570" width="150" height="60" rx="10" fill="#ffedd5"/><text x="1360" y="607" class="tx">Reassign edge</text>
  </g>
  <text x="895" y="672" class="eq">accept = min(1, posterior ratio * proposal ratio)</text>
  <text x="895" y="705" class="sm">Parameter draws are composed after partition updates</text>
  <path d="M755 612h90" class="ar"/>
  <path d="M800 735v48" class="ar"/>

  <rect x="150" y="785" width="1300" height="145" rx="18" fill="#f0fdf4" stroke="#16a34a" class="b"/>
  <text x="800" y="822" text-anchor="middle" class="sh">6. Posterior surveillance products</text>
  <text x="195" y="865" class="tx">P(area i belongs to cluster c)</text>
  <text x="535" y="865" class="tx">Cluster-specific risk trajectories</text>
  <text x="875" y="865" class="tx">Contiguous risk-region map</text>
  <text x="1165" y="865" class="tx">Partition uncertainty</text>
  <text x="195" y="900" class="sm">Applications: weekly US COVID-19 and dengue in Minas Gerais / Sao Paulo</text>
  <text x="800" y="958" text-anchor="middle" class="sm">Original technical schematic of reported method; explanatory notation may differ; not a figure from the paper</text>
</svg>
