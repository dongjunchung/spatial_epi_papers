<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Technical schematic of a structured SEIR metapopulation model with recurrent mobility</title>
  <desc id="desc">Residents move from home patches to destination patches, interact through age and household contact matrices, return home, and undergo SEIR transitions driven by a mobility-weighted force of infection, producing connectivity-dependent epidemic curves and intervention effects.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>.h{font:700 30px Arial;fill:#172554}.sh{font:700 20px Arial;fill:#1e293b}.tx{font:16px Arial;fill:#334155}.sm{font:14px Arial;fill:#475569}.eq{font:15px 'Courier New';fill:#312e81}.b{stroke-width:2.5}.ar{fill:none;stroke:#475569;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1600" height="980" fill="#f8fafc"/>
  <text x="800" y="48" text-anchor="middle" class="h">Movement-interaction-return SEIR metapopulation model</text>

  <rect x="30" y="82" width="520" height="360" rx="18" fill="#eff6ff" stroke="#2563eb" class="b"/>
  <text x="290" y="118" text-anchor="middle" class="sh">1. Recurrent mobility network</text>
  <g fill="none" stroke="#64748b">
    <path d="M140 220C240 115 345 125 430 215" stroke-width="8" marker-end="url(#a)"/>
    <path d="M420 255C320 350 225 350 145 265" stroke-width="4" marker-end="url(#a)"/>
    <path d="M150 260C220 390 350 390 430 270" stroke-width="2" stroke-dasharray="8 6"/>
  </g>
  <circle cx="115" cy="240" r="65" fill="#bfdbfe" stroke="#2563eb" stroke-width="5"/>
  <circle cx="445" cy="240" r="92" fill="#fecaca" stroke="#dc2626" stroke-width="6"/>
  <text x="115" y="235" text-anchor="middle" class="tx">Patch i</text><text x="115" y="260" text-anchor="middle" class="sm">residents</text>
  <text x="445" y="230" text-anchor="middle" class="tx">Patch j</text><text x="445" y="255" text-anchor="middle" class="sm">mobility hub</text>
  <text x="60" y="365" class="eq">Mᵢⱼ = trips from home i to destination j</text>
  <text x="60" y="397" class="eq">pᵢⱼ = Mᵢⱼ / Σₖ Mᵢₖ</text>
  <text x="60" y="425" class="sm">Directed, weighted flows preserve home residence</text>

  <rect x="600" y="82" width="470" height="360" rx="18" fill="#fefce8" stroke="#ca8a04" class="b"/>
  <text x="835" y="118" text-anchor="middle" class="sh">2. Structured interaction at destination</text>
  <text x="632" y="160" class="tx">Individuals mix by:</text>
  <rect x="632" y="185" width="190" height="65" rx="12" fill="#fef3c7"/><text x="727" y="214" text-anchor="middle" class="tx">Age group a,b</text><text x="727" y="238" text-anchor="middle" class="eq">Cᵃᵇ</text>
  <rect x="850" y="185" width="190" height="65" rx="12" fill="#ffedd5"/><text x="945" y="214" text-anchor="middle" class="tx">Household cluster h</text><text x="945" y="238" text-anchor="middle" class="eq">Hʰ</text>
  <text x="632" y="290" class="eq">I*ⱼᵇ(t) = Σᵢ pᵢⱼ Iᵢᵇ(t)</text>
  <text x="632" y="326" class="eq">N*ⱼᵇ(t) = Σᵢ pᵢⱼ Nᵢᵇ(t)</text>
  <text x="632" y="365" class="eq">λᵢᵃ = β Σⱼ pᵢⱼ Σᵦ Cᵃᵇ I*ⱼᵇ/N*ⱼᵇ</text>
  <text x="632" y="405" class="sm">Destination prevalence is projected back to residents</text>

  <rect x="1120" y="82" width="450" height="360" rx="18" fill="#f0fdf4" stroke="#16a34a" class="b"/>
  <text x="1345" y="118" text-anchor="middle" class="sh">3. Within-group SEIR dynamics</text>
  <g font-family="Arial" font-size="22" font-weight="700" text-anchor="middle">
    <rect x="1150" y="170" width="75" height="60" rx="12" fill="#dbeafe"/><text x="1188" y="208" fill="#1e40af">S</text>
    <rect x="1255" y="170" width="75" height="60" rx="12" fill="#fef3c7"/><text x="1293" y="208" fill="#92400e">E</text>
    <rect x="1360" y="170" width="75" height="60" rx="12" fill="#fee2e2"/><text x="1398" y="208" fill="#991b1b">I</text>
    <rect x="1465" y="170" width="75" height="60" rx="12" fill="#dcfce7"/><text x="1503" y="208" fill="#166534">R</text>
  </g>
  <path d="M1225 200h30M1330 200h30M1435 200h30" class="ar"/>
  <text x="1240" y="158" class="sm">λᵢᵃ</text><text x="1345" y="158" class="sm">σ</text><text x="1450" y="158" class="sm">γ</text>
  <text x="1155" y="282" class="eq">dSᵢᵃ/dt = -λᵢᵃ Sᵢᵃ</text>
  <text x="1155" y="315" class="eq">dEᵢᵃ/dt = λᵢᵃSᵢᵃ - σEᵢᵃ</text>
  <text x="1155" y="348" class="eq">dIᵢᵃ/dt = σEᵢᵃ - γIᵢᵃ</text>
  <text x="1155" y="381" class="eq">dRᵢᵃ/dt = γIᵢᵃ</text>
  <text x="1155" y="416" class="sm">Deterministic ODE or stochastic transitions</text>

  <path d="M550 260h50" class="ar"/><path d="M1070 260h50" class="ar"/>
  <path d="M800 442v48" class="ar"/>
  <rect x="160" y="495" width="1280" height="180" rx="18" fill="#eef2ff" stroke="#4f46e5" class="b"/>
  <text x="800" y="532" text-anchor="middle" class="sh">4. One simulation cycle</text>
  <g font-family="Arial" text-anchor="middle">
    <rect x="205" y="570" width="210" height="62" rx="12" fill="#dbeafe"/><text x="310" y="608" class="tx">Home compartments</text>
    <rect x="495" y="570" width="210" height="62" rx="12" fill="#fef3c7"/><text x="600" y="608" class="tx">Move using pᵢⱼ</text>
    <rect x="785" y="570" width="210" height="62" rx="12" fill="#fee2e2"/><text x="890" y="608" class="tx">Interact and transmit</text>
    <rect x="1075" y="570" width="210" height="62" rx="12" fill="#dcfce7"/><text x="1180" y="608" class="tx">Return and progress</text>
  </g>
  <path d="M415 601h80M705 601h80M995 601h80" class="ar"/>
  <path d="M1180 632C1180 662 310 662 310 632" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#a)"/>

  <rect x="30" y="720" width="720" height="210" rx="18" fill="#fff7ed" stroke="#ea580c" class="b"/>
  <text x="390" y="757" text-anchor="middle" class="sh">5. Connectivity-dependent outcomes</text>
  <line x1="90" y1="885" x2="680" y2="885" stroke="#475569" stroke-width="3"/><line x1="90" y1="885" x2="90" y2="790" stroke="#475569" stroke-width="3"/>
  <path d="M90 885C160 880 190 805 260 790C330 780 360 850 470 878" fill="none" stroke="#dc2626" stroke-width="7"/>
  <path d="M90 885C220 883 300 850 395 825C500 798 585 850 680 878" fill="none" stroke="#2563eb" stroke-width="7"/>
  <text x="270" y="808" class="sm" fill="#991b1b">high-connectivity hub: earlier peak</text>
  <text x="455" y="846" class="sm" fill="#1e40af">large, less-connected patch: later peak</text>

  <rect x="800" y="720" width="770" height="210" rx="18" fill="#faf5ff" stroke="#7c3aed" class="b"/>
  <text x="1185" y="757" text-anchor="middle" class="sh">6. Intervention levers and comparisons</text>
  <text x="835" y="797" class="eq">Mobility:      pᵢⱼ → (1-rₘ)pᵢⱼ</text>
  <text x="835" y="832" class="eq">Contact:       Cᵃᵇ → (1-r꜀)Cᵃᵇ</text>
  <text x="835" y="867" class="eq">Transmission:  β → (1-rᵦ)β</text>
  <text x="1190" y="797" class="tx">Compare timing t₀</text>
  <text x="1190" y="832" class="tx">Target hubs vs largest patches</text>
  <text x="1190" y="867" class="tx">Contrast pathogen parameter sets</text>
  <text x="1190" y="902" class="tx">Measure peak, attack rate, spatial spread</text>
  <text x="800" y="958" text-anchor="middle" class="sm">Illustrative technical schematic based on the reported model class; not a figure from the paper</text>
</svg>
