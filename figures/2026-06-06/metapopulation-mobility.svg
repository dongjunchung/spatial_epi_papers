<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">Spatial metapopulation mobility and epidemic timing</title>
  <desc id="desc">Recurrent mobility connects population groups, with highly connected locations showing faster epidemic growth.</desc>
  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#172554">Connectivity can matter more than population size</text>
  <g fill="none" stroke="#64748b" stroke-width="7">
    <path d="M170 210C300 80 420 100 515 230"/><path d="M515 245C400 390 300 390 185 270"/>
    <path d="M535 220C660 95 760 110 855 205"/><path d="M850 260C730 390 640 375 535 270"/>
  </g>
  <g fill="#64748b">
    <path d="M515 230l-27-4 17-21z"/><path d="M185 270l27 3-17 22z"/>
    <path d="M855 205l-27-3 17-22z"/><path d="M535 270l27 3-17 22z"/>
  </g>
  <g font-family="Arial" text-anchor="middle">
    <circle cx="145" cy="240" r="78" fill="#bfdbfe" stroke="#2563eb" stroke-width="6"/>
    <text x="145" y="235" font-size="22" font-weight="700" fill="#1e3a8a">Location A</text><text x="145" y="267" font-size="17" fill="#1e40af">less connected</text>
    <circle cx="525" cy="245" r="105" fill="#fecaca" stroke="#dc2626" stroke-width="7"/>
    <text x="525" y="238" font-size="24" font-weight="700" fill="#7f1d1d">Location B</text><text x="525" y="273" font-size="18" fill="#991b1b">mobility hub</text>
    <circle cx="880" cy="235" r="88" fill="#dcfce7" stroke="#16a34a" stroke-width="6"/>
    <text x="880" y="230" font-size="22" font-weight="700" fill="#14532d">Location C</text><text x="880" y="262" font-size="17" fill="#166534">large population</text>
  </g>
  <line x1="995" y1="420" x2="1150" y2="420" stroke="#475569" stroke-width="4"/>
  <line x1="995" y1="420" x2="995" y2="330" stroke="#475569" stroke-width="4"/>
  <path d="M995 420C1020 410 1025 350 1050 342C1080 335 1090 390 1150 410" fill="none" stroke="#dc2626" stroke-width="7"/>
  <path d="M995 420C1040 415 1065 380 1090 370C1120 360 1135 390 1150 402" fill="none" stroke="#2563eb" stroke-width="7"/>
  <text x="1075" y="465" text-anchor="middle" font-family="Arial" font-size="18" fill="#334155">Earlier, sharper peak at hub</text>
  <rect x="85" y="450" width="760" height="70" rx="15" fill="#e2e8f0"/>
  <text x="465" y="480" text-anchor="middle" font-family="Arial" font-size="19" font-weight="700" fill="#334155">Movement - interaction - return</text>
  <text x="465" y="506" text-anchor="middle" font-family="Arial" font-size="16" fill="#475569">Households, age groups, and recurrent travel shape transmission</text>
  <text x="600" y="575" text-anchor="middle" font-family="Arial" font-size="17" fill="#475569">Illustrative schematic, not a figure from the paper</text>
</svg>
