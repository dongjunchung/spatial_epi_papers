<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for meteorology-linked other infectious diarrhea risk and warning in China</title>
  <desc id="desc">Multi-panel SVG showing city-level OID surveillance and meteorological inputs, a quasi-Poisson DLNM and multivariate meta-analysis, IPCC hazard-exposure-vulnerability risk components, forecast model comparison among SARIMAX, GAM, and random forest, P75 alert thresholding, reported validation metrics, and intervention outputs. This is an original schematic, not a reproduced publication figure.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#0f172a}.sub{font:600 14px Arial,sans-serif;fill:#334155}.txt{font:13px Arial,sans-serif;fill:#334155}.small{font:12px Arial,sans-serif;fill:#475569}.eq{font:13px Consolas,monospace;fill:#0f172a}.tag{font:700 12px Arial,sans-serif;fill:#fff}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.red{fill:#fee2e2;stroke:#dc2626}.purple{fill:#ede9fe;stroke:#7c3aed}.line{stroke:#334155;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.muted{stroke:#94a3b8;stroke-width:1.2;fill:none}.chip{rx:12;stroke-width:1.2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="860"/>
  <text x="40" y="36" class="head">Original technical schematic: meteorology-linked OID risk assessment, forecasting, and warning</text>
  <text x="40" y="58" class="small">Source-reported details are shown in labels; equations are explanatory notation and may differ from the paper.</text>

  <rect x="35" y="85" width="350" height="300" class="panel"/>
  <rect x="55" y="105" width="28" height="28" fill="#2563eb" rx="5"/><text x="64" y="125" class="tag">A</text>
  <text x="95" y="124" class="sub">City-week input table</text>
  <rect x="70" y="155" width="115" height="62" class="blue chip"/>
  <text x="84" y="180" class="txt">OID cases</text>
  <text x="84" y="199" class="small">316 cities</text>
  <rect x="230" y="155" width="115" height="62" class="green chip"/>
  <text x="244" y="180" class="txt">Meteorology</text>
  <text x="244" y="199" class="small">weekly lags</text>
  <line x1="185" y1="186" x2="230" y2="186" class="line"/>
  <rect x="80" y="250" width="255" height="78" fill="#f1f5f9" stroke="#94a3b8" rx="8"/>
  <text x="98" y="276" class="eq">Y_{i,t}: cases in city i, week t</text>
  <text x="98" y="299" class="eq">X_{i,t-l}: weather at lag l</text>
  <text x="98" y="322" class="eq">i = 1,...,316; t = 2014-2019</text>

  <rect x="425" y="85" width="350" height="300" class="panel"/>
  <rect x="445" y="105" width="28" height="28" fill="#7c3aed" rx="5"/><text x="454" y="125" class="tag">B</text>
  <text x="485" y="124" class="sub">DLNM and city pooling</text>
  <rect x="458" y="155" width="285" height="92" class="purple chip"/>
  <text x="475" y="181" class="eq">Y_{i,t} ~ quasi-Poisson(mu_{i,t})</text>
  <text x="475" y="205" class="eq">log(mu_{i,t}) = alpha_i + cb(X,lags)</text>
  <text x="475" y="229" class="eq">+ season/trend terms (not fully reported)</text>
  <line x1="600" y1="250" x2="600" y2="288" class="line"/>
  <rect x="480" y="292" width="240" height="54" class="blue chip"/>
  <text x="498" y="318" class="txt">Multivariate meta-analysis</text>
  <text x="498" y="337" class="small">pooled temperature-risk curves</text>

  <rect x="815" y="85" width="350" height="300" class="panel"/>
  <rect x="835" y="105" width="28" height="28" fill="#d97706" rx="5"/><text x="844" y="125" class="tag">C</text>
  <text x="875" y="124" class="sub">IPCC-style spatial risk components</text>
  <rect x="850" y="160" width="130" height="56" class="red chip"/><text x="874" y="193" class="txt">Hazard</text>
  <rect x="1005" y="160" width="130" height="56" class="amber chip"/><text x="1025" y="193" class="txt">Exposure</text>
  <rect x="850" y="245" width="130" height="56" class="purple chip"/><text x="865" y="278" class="txt">Sensitivity</text>
  <rect x="1005" y="245" width="130" height="56" class="green chip"/><text x="1018" y="278" class="txt">Adaptability</text>
  <path d="M980 188 C995 188 990 188 1005 188" class="line"/>
  <path d="M915 216 L915 245" class="line"/>
  <path d="M1070 216 L1070 245" class="line"/>
  <rect x="900" y="325" width="185" height="36" fill="#fee2e2" stroke="#dc2626" rx="18"/>
  <text x="926" y="348" class="txt">mapped city risk score</text>

  <rect x="35" y="420" width="545" height="365" class="panel"/>
  <rect x="55" y="440" width="28" height="28" fill="#0f766e" rx="5"/><text x="64" y="460" class="tag">D</text>
  <text x="95" y="459" class="sub">Forecasting and early warning</text>
  <rect x="70" y="500" width="125" height="60" class="blue chip"/><text x="98" y="526" class="txt">SARIMAX</text><text x="90" y="545" class="small">time-series baseline</text>
  <rect x="235" y="500" width="125" height="60" class="green chip"/><text x="284" y="526" class="txt">GAM</text><text x="258" y="545" class="small">smooth effects</text>
  <rect x="400" y="500" width="125" height="60" class="amber chip"/><text x="429" y="526" class="txt">Random forest</text><text x="430" y="545" class="small">best reported</text>
  <line x1="462" y1="560" x2="462" y2="612" class="line"/>
  <rect x="315" y="615" width="295" height="70" fill="#f1f5f9" stroke="#94a3b8" rx="8"/>
  <text x="335" y="641" class="eq">Alert_{i,t}=1 if RF forecast &gt; P75_i</text>
  <text x="335" y="665" class="small">P75 = 75th percentile of historical weekly cases</text>
  <rect x="75" y="630" width="190" height="85" class="red chip"/>
  <text x="94" y="656" class="txt">Reported validation</text>
  <text x="94" y="678" class="small">test R2 0.76; AUC 0.918</text>
  <text x="94" y="698" class="small">sensitivity 94.69%; specificity 86.18%</text>

  <rect x="620" y="420" width="545" height="365" class="panel"/>
  <rect x="640" y="440" width="28" height="28" fill="#dc2626" rx="5"/><text x="649" y="460" class="tag">E</text>
  <text x="680" y="459" class="sub">Spatial outputs and action targets</text>
  <rect x="665" y="500" width="215" height="180" fill="#fef2f2" stroke="#dc2626" rx="8"/>
  <path d="M725 550 C740 520 792 526 805 565 C830 565 846 592 830 616 C802 650 725 642 700 610 C678 583 695 562 725 550Z" fill="#fecaca" stroke="#b91c1c" stroke-width="1.5"/>
  <circle cx="776" cy="592" r="10" fill="#ef4444"/><circle cx="742" cy="612" r="7" fill="#f97316"/><circle cx="810" cy="615" r="7" fill="#f97316"/>
  <text x="690" y="705" class="small">Reported persistent high-risk areas:</text>
  <text x="690" y="725" class="small">Southern, Jiangnan, Southwest China</text>
  <line x1="880" y1="590" x2="940" y2="590" class="line"/>
  <rect x="945" y="510" width="175" height="56" class="green chip"/><text x="974" y="543" class="txt">Earlier alerts</text>
  <rect x="945" y="595" width="175" height="56" class="amber chip"/><text x="966" y="628" class="txt">Targeted control</text>
  <rect x="945" y="680" width="175" height="56" class="blue chip"/><text x="967" y="713" class="txt">Climate-resilient plans</text>
  <text x="40" y="825" class="small">Original technical schematic; not a reproduced publication figure. Abbreviations: OID, other infectious diarrhea; DLNM, distributed lag non-linear model; RF, random forest.</text>
</svg>
