<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for amortized Bayesian areal wombling and residual disparity elimination targets</title>
  <desc id="desc">Multi-panel SVG showing county-level disease-map inputs, adjacency pairs, generic Bayesian areal wombling notation, neural posterior estimation, MCMC concordance checks, residual disparity elimination target logic, county covariate layers, and scalable outputs for boundary probabilities and policy-facing disparity reduction. This is an original schematic, not a reproduced publication figure.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#0f172a}.sub{font:600 14px Arial,sans-serif;fill:#334155}.txt{font:13px Arial,sans-serif;fill:#334155}.small{font:12px Arial,sans-serif;fill:#475569}.eq{font:13px Consolas,monospace;fill:#0f172a}.tag{font:700 12px Arial,sans-serif;fill:#fff}.blue{fill:#dbeafe;stroke:#2563eb}.green{fill:#dcfce7;stroke:#16a34a}.amber{fill:#fef3c7;stroke:#d97706}.red{fill:#fee2e2;stroke:#dc2626}.purple{fill:#ede9fe;stroke:#7c3aed}.line{stroke:#334155;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.edge{stroke:#64748b;stroke-width:2}.chip{rx:10;stroke-width:1.2}
    </style>
  </defs>
  <rect class="bg" width="1200" height="860"/>
  <text x="40" y="36" class="head">Original technical schematic: amortized Bayesian disease-boundary detection</text>
  <text x="40" y="58" class="small">Only abstract and data-availability details were available from source XML; model notation is explanatory and may differ from the preprint.</text>

  <rect x="35" y="85" width="350" height="300" class="panel"/>
  <rect x="55" y="105" width="28" height="28" fill="#2563eb" rx="5"/><text x="64" y="125" class="tag">A</text>
  <text x="95" y="124" class="sub">Areal disease-map inputs</text>
  <g transform="translate(84 165)">
    <line x1="40" y1="30" x2="105" y2="20" class="edge"/><line x1="105" y1="20" x2="165" y2="55" class="edge"/><line x1="40" y1="30" x2="70" y2="100" class="edge"/><line x1="70" y1="100" x2="150" y2="125" class="edge"/><line x1="165" y1="55" x2="150" y2="125" class="edge"/><line x1="105" y1="20" x2="70" y2="100" class="edge"/>
    <circle cx="40" cy="30" r="20" fill="#dbeafe" stroke="#2563eb"/><circle cx="105" cy="20" r="20" fill="#fee2e2" stroke="#dc2626"/><circle cx="165" cy="55" r="20" fill="#fef3c7" stroke="#d97706"/><circle cx="70" cy="100" r="20" fill="#dcfce7" stroke="#16a34a"/><circle cx="150" cy="125" r="20" fill="#ede9fe" stroke="#7c3aed"/>
  </g>
  <rect x="80" y="305" width="260" height="48" fill="#f1f5f9" stroke="#94a3b8" rx="8"/>
  <text x="96" y="326" class="small">Mainland U.S. county graph W</text>
  <text x="96" y="345" class="small">Cancer mortality plus public county covariates</text>

  <rect x="425" y="85" width="350" height="300" class="panel"/>
  <rect x="445" y="105" width="28" height="28" fill="#7c3aed" rx="5"/><text x="454" y="125" class="tag">B</text>
  <text x="485" y="124" class="sub">Bayesian areal wombling</text>
  <rect x="458" y="155" width="285" height="106" class="purple chip"/>
  <text x="475" y="181" class="eq">Y_i | theta_i ~ disease-map likelihood</text>
  <text x="475" y="205" class="eq">theta_i = x_i beta + spatial effect_i</text>
  <text x="475" y="229" class="eq">Boundary_{ij}: theta_i - theta_j for W_{ij}=1</text>
  <text x="475" y="250" class="small">Generic notation; exact form not in source XML</text>
  <line x1="600" y1="262" x2="600" y2="295" class="line"/>
  <rect x="480" y="300" width="240" height="46" class="blue chip"/>
  <text x="502" y="329" class="txt">posterior Pr(boundary differs)</text>

  <rect x="815" y="85" width="350" height="300" class="panel"/>
  <rect x="835" y="105" width="28" height="28" fill="#0f766e" rx="5"/><text x="844" y="125" class="tag">C</text>
  <text x="875" y="124" class="sub">Amortized posterior estimation</text>
  <rect x="860" y="155" width="110" height="64" class="blue chip"/><text x="884" y="181" class="txt">simulated or</text><text x="887" y="200" class="txt">observed maps</text>
  <rect x="1000" y="155" width="110" height="64" class="green chip"/><text x="1020" y="181" class="txt">neural</text><text x="1016" y="200" class="txt">estimator</text>
  <line x1="970" y1="187" x2="1000" y2="187" class="line"/>
  <rect x="930" y="265" width="110" height="64" class="amber chip"/><text x="956" y="291" class="txt">posterior</text><text x="964" y="310" class="txt">draws</text>
  <line x1="1055" y1="219" x2="1000" y2="265" class="line"/>
  <rect x="865" y="340" width="250" height="28" fill="#f1f5f9" stroke="#94a3b8" rx="14"/>
  <text x="897" y="359" class="small">Reported concordance with MCMC analysis</text>

  <rect x="35" y="420" width="350" height="365" class="panel"/>
  <rect x="55" y="440" width="28" height="28" fill="#d97706" rx="5"/><text x="64" y="460" class="tag">D</text>
  <text x="95" y="459" class="sub">Residual Disparity Elimination Target</text>
  <rect x="70" y="500" width="275" height="96" class="amber chip"/>
  <text x="92" y="528" class="eq">RDET_{i->j}: minimum reduction</text>
  <text x="92" y="552" class="eq">in mortality/prevalence for area i</text>
  <text x="92" y="576" class="eq">to eliminate disparity with neighbor j</text>
  <line x1="207" y1="596" x2="207" y2="635" class="line"/>
  <rect x="90" y="640" width="235" height="58" class="red chip"/>
  <text x="112" y="666" class="txt">Policy-facing estimand</text>
  <text x="112" y="685" class="small">how much reduction is required?</text>
  <text x="80" y="735" class="small">Name and interpretation are source-reported.</text>

  <rect x="425" y="420" width="350" height="365" class="panel"/>
  <rect x="445" y="440" width="28" height="28" fill="#16a34a" rx="5"/><text x="454" y="460" class="tag">E</text>
  <text x="485" y="459" class="sub">Public covariate layers</text>
  <rect x="470" y="500" width="118" height="50" class="blue chip"/><text x="496" y="531" class="txt">Mortality</text>
  <rect x="612" y="500" width="118" height="50" class="green chip"/><text x="642" y="531" class="txt">Smoking</text>
  <rect x="470" y="580" width="118" height="50" class="amber chip"/><text x="486" y="611" class="txt">Insurance</text>
  <rect x="612" y="580" width="118" height="50" class="red chip"/><text x="627" y="611" class="txt">Obesity/diabetes</text>
  <rect x="470" y="660" width="260" height="50" class="purple chip"/><text x="500" y="691" class="txt">SVI, unemployment, inactivity</text>
  <text x="470" y="745" class="small">Layers listed from the source data-availability statement.</text>

  <rect x="815" y="420" width="350" height="365" class="panel"/>
  <rect x="835" y="440" width="28" height="28" fill="#dc2626" rx="5"/><text x="844" y="460" class="tag">F</text>
  <text x="875" y="459" class="sub">Scalable boundary outputs</text>
  <rect x="860" y="510" width="250" height="52" class="blue chip"/><text x="885" y="543" class="txt">Posterior boundary probabilities</text>
  <rect x="860" y="595" width="250" height="52" class="green chip"/><text x="895" y="628" class="txt">Hundreds of outcomes screened</text>
  <rect x="860" y="680" width="250" height="52" class="amber chip"/><text x="900" y="713" class="txt">Disparity-reduction targets</text>
  <line x1="985" y1="562" x2="985" y2="595" class="line"/>
  <line x1="985" y1="647" x2="985" y2="680" class="line"/>
  <text x="40" y="825" class="small">Original technical schematic; not a reproduced publication figure. ABI, amortized Bayesian inference; RDET, Residual Disparity Elimination Target.</text>
</svg>
