<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for global STI shared-component spatiotemporal modeling</title>
  <desc id="desc">Five-panel SVG. Panel A shows 204 countries and territories, multiple STI incidence counts, and 1990 to 2023 Global Burden of Disease data. Panel B shows a negative-binomial shared-component spatiotemporal model with scaled intrinsic CAR shared spatial component, disease-specific spatial deviations, first-order random-walk temporal effects, and socioeconomic covariates. Panel C shows posterior shared spatial score and exceedance probability outputs. Panel D shows external validation against Socio-demographic Index and HIV AIDS mortality. Panel E highlights integrated STI prevention prioritization.</desc>
  <style>
    .bg{fill:#f7f8fb}.panel{fill:#fff;stroke:#273449;stroke-width:1.4;rx:8}.head{font:700 20px Arial,sans-serif;fill:#1d2638}.label{font:700 15px Arial,sans-serif;fill:#263044}.txt{font:13px Arial,sans-serif;fill:#263044}.small{font:12px Arial,sans-serif;fill:#536073}.eq{font:14px "Courier New",monospace;fill:#1f2937}.note{font:12px Arial,sans-serif;fill:#6b4b00}.box{fill:#eef4ff;stroke:#5875b8;stroke-width:1.1;rx:6}.box2{fill:#edf8ef;stroke:#4d9a63;stroke-width:1.1;rx:6}.box3{fill:#fff2df;stroke:#c4822e;stroke-width:1.1;rx:6}.box4{fill:#f6effb;stroke:#8a60a9;stroke-width:1.1;rx:6}.arrow{stroke:#536074;stroke-width:2;fill:none;marker-end:url(#arrow)}.dot{fill:#6aa5c8;stroke:#fff;stroke-width:1}.hot{fill:#d65f5f}.mid{fill:#efc46a}.line{stroke:#536074;stroke-width:2;fill:none}.neg{stroke:#2f7ebc;stroke-width:3;fill:none}.pos{stroke:#d65f5f;stroke-width:3;fill:none}
  </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#536074"/></marker></defs>
  <rect class="bg" width="1180" height="760"/>
  <text x="34" y="38" class="head">Original technical schematic, not a reproduced publication figure</text>
  <text x="34" y="60" class="note">Reported details: medRxiv preprint, GBD 2023, 204 countries/territories, 1990-2023, negative-binomial likelihood, scaled ICAR shared spatial component, disease-specific deviations, RW1 temporal effects.</text>

  <rect class="panel" x="28" y="88" width="348" height="300"/>
  <text x="50" y="120" class="label">A. Global STI country-year panel</text>
  <g transform="translate(70 150)">
    <ellipse cx="132" cy="84" rx="124" ry="68" fill="#edf2f7" stroke="#8a9ab0"/>
    <circle class="dot hot" cx="104" cy="88" r="9"/><circle class="dot hot" cx="118" cy="108" r="9"/><circle class="dot hot" cx="132" cy="126" r="9"/>
    <circle class="dot mid" cx="210" cy="98" r="7"/><circle class="dot mid" cx="230" cy="116" r="7"/><circle class="dot mid" cx="72" cy="68" r="7"/>
    <circle class="dot" cx="168" cy="58" r="7"/><circle class="dot" cx="44" cy="116" r="7"/><circle class="dot" cx="250" cy="66" r="7"/>
  </g>
  <text x="70" y="338" class="small">Incidence counts by country c, STI d, year t</text>
  <text x="70" y="356" class="small">Outcome decomposed into shared and disease-specific geography.</text>

  <rect class="panel" x="404" y="88" width="364" height="300"/>
  <text x="426" y="120" class="label">B. Bayesian shared-component model</text>
  <rect x="438" y="150" width="294" height="148" class="box"/>
  <text x="456" y="178" class="eq">Y_cdt ~ NegBin(mu_cdt)</text>
  <text x="456" y="204" class="eq">log(rate_cdt)=X_ct b_d</text>
  <text x="456" y="230" class="eq"> + lambda_d S_c + delta_cd</text>
  <text x="456" y="256" class="eq"> + RW1_dt</text>
  <text x="456" y="282" class="small">S_c: scaled ICAR shared spatial score</text>
  <text x="456" y="302" class="small">Notation is explanatory.</text>
  <rect x="482" y="326" width="206" height="42" class="box2"/><text x="510" y="353" class="txt">posterior inference</text>

  <rect class="panel" x="796" y="88" width="356" height="300"/>
  <text x="818" y="120" class="label">C. Shared score + stability</text>
  <rect x="832" y="154" width="128" height="80" class="box3"/><text x="850" y="184" class="eq">score_c=E[S_c|y]</text><text x="850" y="208" class="small">co-occurrence burden</text>
  <path class="arrow" d="M966 194 H1010"/>
  <rect x="1018" y="154" width="100" height="80" class="box4"/><text x="1036" y="184" class="eq">Pr(S_c&gt;0)</text><text x="1036" y="208" class="small">directional</text><text x="1036" y="226" class="small">stability</text>
  <text x="840" y="284" class="small">Reported high-score countries: Eswatini, Lesotho, Malawi,</text>
  <text x="840" y="302" class="small">Mozambique, South Africa; 57 high-stability countries.</text>

  <rect class="panel" x="28" y="424" width="548" height="286"/>
  <text x="50" y="456" class="label">D. External validation</text>
  <g transform="translate(82 512)">
    <path class="neg" d="M0 18 C58 30 104 58 158 106 C196 140 228 158 270 168"/>
    <text x="18" y="198" class="small">shared score vs SDI: Spearman rho = -0.619</text>
    <path class="pos" d="M0 168 C60 140 104 98 160 58 C202 30 236 22 270 16"/>
    <text x="18" y="222" class="small">HIV/AIDS mortality IRR = 14.64 per SD shared score</text>
  </g>
  <rect x="380" y="512" width="142" height="92" class="box2"/><text x="398" y="540" class="txt">sensitivity</text><text x="398" y="562" class="small">ranking stability</text><text x="398" y="580" class="small">rho &gt;= 0.9999</text>

  <rect class="panel" x="604" y="424" width="548" height="286"/>
  <text x="626" y="456" class="label">E. Prevention estimands</text>
  <rect x="650" y="504" width="196" height="76" class="box3"/><text x="668" y="532" class="txt">integrated STI screening</text><text x="668" y="554" class="small">countries with shared</text><text x="668" y="572" class="small">high co-occurrence</text>
  <path class="arrow" d="M854 542 H914"/>
  <rect x="922" y="504" width="188" height="76" class="box2"/><text x="940" y="532" class="txt">resource allocation</text><text x="940" y="554" class="small">posterior uncertainty</text><text x="940" y="572" class="small">and stability thresholds</text>
  <rect x="744" y="624" width="266" height="46" class="box"/><text x="762" y="653" class="txt">country-level vulnerability index</text>
</svg>
