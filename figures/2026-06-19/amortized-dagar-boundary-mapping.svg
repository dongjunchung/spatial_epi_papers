<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1080" viewBox="0 0 1700 1080" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for amortized Bayesian spatial disease mapping with DAGAR residual effects</title>
  <desc id="desc">A four-panel schematic of the reported framework: areal disease counts, expected-count offsets, covariates, and adjacency graphs feed a Poisson disease-mapping likelihood with boundary-aware smoothing and a DAGAR residual spatial prior; simulated maps train a permutation-invariant graph summary network and conditional normalizing flow; deployment returns approximate posterior draws, posterior risk maps, boundary probabilities, predictive checks, interval coverage, and comparison with MCMC.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0 0L0 8L11 4z" fill="#334155"/></marker>
    <style>
      .title{font:700 30px Arial;fill:#0f172a}
      .panel{font:700 23px Arial;fill:#1e293b}
      .label{font:600 17px Arial;fill:#1e293b}
      .text{font:15px Arial;fill:#334155}
      .small{font:13px Arial;fill:#475569}
      .eq{font:15px 'Courier New',monospace;fill:#312e81}
      .note{font:13px Arial;fill:#64748b}
      .box{stroke-width:2.4}
      .arrow{fill:none;stroke:#334155;stroke-width:3;marker-end:url(#arrow)}
      .thin{fill:none;stroke:#64748b;stroke-width:2}
    </style>
  </defs>
  <rect width="1700" height="1080" fill="#f8fafc"/>
  <text x="850" y="48" text-anchor="middle" class="title">Amortized Bayesian spatial disease mapping and disparity detection</text>
  <text x="850" y="76" text-anchor="middle" class="note">Original technical schematic for Aiello and Banerjee, arXiv:2606.18146; explanatory notation may differ from the paper</text>

  <rect x="40" y="105" width="775" height="410" rx="10" fill="#eff6ff" stroke="#2563eb" class="box"/>
  <text x="70" y="142" class="panel">A. Areal surveillance inputs and graph indices</text>
  <text x="78" y="177" class="text">Reported inputs: counts, offsets, covariates, and adjacency matrices across areal graphs.</text>
  <g transform="translate(87 205)">
    <rect x="0" y="0" width="245" height="160" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="122" y="28" text-anchor="middle" class="label">Areal units i = 1,...,n</text>
    <path d="M70 52 L123 26 L194 58 L174 127 L91 134 Z" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2"/>
    <path d="M123 26 L121 82 L70 52M121 82 L194 58M121 82 L174 127M121 82 L91 134" class="thin"/>
    <circle cx="121" cy="82" r="5" fill="#1d4ed8"/><circle cx="70" cy="52" r="5" fill="#1d4ed8"/>
    <circle cx="194" cy="58" r="5" fill="#1d4ed8"/><circle cx="174" cy="127" r="5" fill="#1d4ed8"/>
    <circle cx="91" cy="134" r="5" fill="#1d4ed8"/>
  </g>
  <g transform="translate(380 205)">
    <rect x="0" y="0" width="360" height="160" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
    <text x="28" y="38" class="eq">Y_i = observed disease count</text>
    <text x="28" y="72" class="eq">E_i = expected count / offset</text>
    <text x="28" y="106" class="eq">x_i = covariates</text>
    <text x="28" y="140" class="eq">A_ij = adjacency / neighbor graph</text>
  </g>
  <g transform="translate(88 395)">
    <rect x="0" y="0" width="652" height="76" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="24" y="31" class="label">Multiple graph sizes and structures</text>
    <text x="24" y="58" class="small">The abstract says the engine generalizes across maps with varying region counts and adjacency structures.</text>
  </g>

  <rect x="885" y="105" width="775" height="410" rx="10" fill="#fefce8" stroke="#ca8a04" class="box"/>
  <text x="915" y="142" class="panel">B. Boundary-aware Bayesian disease-mapping model</text>
  <text x="923" y="177" class="text">Reported components: Poisson likelihood, covariate-driven smoothing interruption, and DAGAR residual dependence.</text>
  <rect x="925" y="207" width="335" height="128" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="950" y="242" class="label">Count likelihood</text>
  <text x="950" y="278" class="eq">Y_i | theta_i ~ Poisson(E_i theta_i)</text>
  <text x="950" y="310" class="eq">log(theta_i) = x_i beta + phi_i</text>
  <rect x="1310" y="207" width="300" height="128" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="1335" y="242" class="label">DAGAR residual prior</text>
  <text x="1335" y="278" class="eq">phi = graph-ordered spatial effect</text>
  <text x="1335" y="310" class="small">Captures residual areal dependence</text>
  <path d="M1260 270h50" class="arrow"/>
  <rect x="925" y="370" width="685" height="86" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
  <text x="950" y="403" class="label">Boundary / disparity mechanism</text>
  <text x="950" y="431" class="eq">w_ij = g(x_i, x_j, dissimilarity_ij)  ->  interrupt smoothing when neighbors differ</text>
  <text x="950" y="455" class="small">Equation shown as explanatory notation; the abstract reports a covariate-driven rule, not this exact form.</text>

  <path d="M815 310h70" class="arrow"/>
  <path d="M1272 515v72" class="arrow"/>

  <rect x="40" y="590" width="775" height="390" rx="10" fill="#f5f3ff" stroke="#7c3aed" class="box"/>
  <text x="70" y="627" class="panel">C. Amortized posterior engine</text>
  <text x="78" y="662" class="text">Simulation-trained inference approximates posterior draws for new areal graphs.</text>
  <rect x="85" y="698" width="210" height="92" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="190" y="730" text-anchor="middle" class="label">Simulated maps</text>
  <text x="190" y="759" text-anchor="middle" class="small">Known parameters, counts,</text>
  <text x="190" y="779" text-anchor="middle" class="small">offsets, x, A</text>
  <rect x="347" y="698" width="260" height="92" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="477" y="730" text-anchor="middle" class="label">Graph summary network</text>
  <text x="477" y="759" text-anchor="middle" class="small">Permutation-invariant, graph-aware</text>
  <text x="477" y="779" text-anchor="middle" class="small">encoding of Y, E, x, A</text>
  <rect x="85" y="845" width="210" height="92" rx="8" fill="#fae8ff" stroke="#c026d3" stroke-width="2"/>
  <text x="190" y="877" text-anchor="middle" class="label">Conditional flow</text>
  <text x="190" y="906" text-anchor="middle" class="small">Transforms noise into</text>
  <text x="190" y="926" text-anchor="middle" class="small">posterior draws</text>
  <rect x="347" y="845" width="260" height="92" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="477" y="877" text-anchor="middle" class="label">Approximate posterior</text>
  <text x="477" y="906" text-anchor="middle" class="eq">q( beta, phi, boundaries | data )</text>
  <text x="477" y="926" text-anchor="middle" class="small">Reusable for new maps</text>
  <path d="M295 744h52" class="arrow"/>
  <path d="M477 790v55" class="arrow"/>
  <path d="M347 891h-52" class="arrow"/>
  <rect x="632" y="718" width="132" height="200" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="2"/>
  <text x="698" y="751" text-anchor="middle" class="label">Deploy</text>
  <text x="698" y="782" text-anchor="middle" class="small">Glasgow</text>
  <text x="698" y="805" text-anchor="middle" class="small">respiratory</text>
  <line x1="666" y1="826" x2="730" y2="826" stroke="#a855f7" stroke-width="2"/>
  <text x="698" y="858" text-anchor="middle" class="small">California</text>
  <text x="698" y="881" text-anchor="middle" class="small">lung cancer</text>
  <text x="698" y="910" text-anchor="middle" class="small">reported examples</text>
  <path d="M607 891h25" class="arrow"/>

  <rect x="885" y="590" width="775" height="390" rx="10" fill="#ecfdf5" stroke="#16a34a" class="box"/>
  <text x="915" y="627" class="panel">D. Validation, uncertainty, and policy estimands</text>
  <text x="923" y="662" class="text">Reported outputs emphasize posterior uncertainty and agreement with conventional fitting.</text>
  <g transform="translate(930 700)">
    <rect x="0" y="0" width="200" height="105" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="100" y="32" text-anchor="middle" class="label">Risk maps</text>
    <text x="100" y="64" text-anchor="middle" class="eq">P(theta_i | Y)</text>
    <text x="100" y="88" text-anchor="middle" class="small">posterior draws</text>
  </g>
  <g transform="translate(1170 700)">
    <rect x="0" y="0" width="210" height="105" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
    <text x="105" y="32" text-anchor="middle" class="label">Boundary evidence</text>
    <text x="105" y="64" text-anchor="middle" class="eq">P(w_ij near 0 | Y)</text>
    <text x="105" y="88" text-anchor="middle" class="small">edge-level probabilities</text>
  </g>
  <g transform="translate(1420 700)">
    <rect x="0" y="0" width="190" height="105" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="95" y="32" text-anchor="middle" class="label">Calibration</text>
    <text x="95" y="64" text-anchor="middle" class="small">coverage and posterior</text>
    <text x="95" y="88" text-anchor="middle" class="small">predictive checks</text>
  </g>
  <g transform="translate(930 850)">
    <rect x="0" y="0" width="280" height="75" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
    <text x="140" y="31" text-anchor="middle" class="label">Benchmark against MCMC</text>
    <text x="140" y="58" text-anchor="middle" class="small">reported close agreement on primary boundary evidence</text>
  </g>
  <g transform="translate(1245 850)">
    <rect x="0" y="0" width="365" height="75" rx="8" fill="#f7fee7" stroke="#65a30d" stroke-width="2"/>
    <text x="182" y="31" text-anchor="middle" class="label">Decision-facing summaries</text>
    <text x="182" y="58" text-anchor="middle" class="small">high-risk areas, disparity boundaries, uncertainty intervals</text>
  </g>
  <path d="M815 785h70" class="arrow"/>

  <text x="850" y="1034" text-anchor="middle" class="note">This is an original technical schematic for the update, not a reproduced publication figure. Reported details come from the arXiv abstract; equations are cautious explanatory notation.</text>
</svg>
