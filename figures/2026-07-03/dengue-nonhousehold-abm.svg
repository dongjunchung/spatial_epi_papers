<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for dengue non-household mobility ABM</title>
  <desc id="desc">Six-panel schematic showing household and non-household places, Kenya-calibrated agent-based dengue model expansion, three urban configurations, movement variables, case and clustering outputs, and intervention implications.</desc>
  <defs>
    <style>
      .bg{fill:#faf8f3}.panel{fill:#fff;stroke:#a99d8f;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#2f2b24}.t{font:14px Arial,sans-serif;fill:#332f2a}.s{font:12px Arial,sans-serif;fill:#5d554b}.eq{font:13px Consolas,monospace;fill:#332f2a}.arrow{stroke:#5f6f52;stroke-width:2;fill:none;marker-end:url(#arrow)}.hh{fill:#cfe8ef;stroke:#39728a}.nh{fill:#f5c26b;stroke:#9c6422}.vec{fill:#ef7b7b;stroke:#9d3030}.ok{fill:#d9ead3;stroke:#5d8b4f}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5f6f52"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">Notation is explanatory; the paper reports an ABM calibrated with field data from Kenya.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. Places and agents</text>
  <rect class="hh" x="60" y="145" width="70" height="48" rx="5"/><text x="76" y="174" class="t">HH</text>
  <rect class="hh" x="150" y="205" width="70" height="48" rx="5"/><text x="166" y="234" class="t">HH</text>
  <rect class="nh" x="250" y="146" width="92" height="48" rx="5"/><text x="265" y="175" class="t">NH site</text>
  <circle class="vec" cx="168" cy="154" r="9"/><circle class="vec" cx="290" cy="222" r="9"/>
  <path class="arrow" d="M128 168 C174 152,211 150,249 165"/>
  <path class="arrow" d="M221 226 C244 225,264 224,282 222"/>
  <text x="58" y="260" class="s">HH = household; NH = workplace, market, recreation, etc.</text>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. ABM state transitions</text>
  <text x="445" y="144" class="eq">human: S -> E -> I -> R</text>
  <text x="445" y="170" class="eq">mosquito: S_v -> E_v -> I_v</text>
  <text x="445" y="204" class="eq">bite risk depends on current place p(t)</text>
  <text x="445" y="238" class="s">Expanded model varies movement of people and vectors between HH and NH.</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. Urban configurations</text>
  <circle class="nh" cx="870" cy="165" r="14"/><circle class="nh" cx="940" cy="222" r="14"/><circle class="nh" cx="1030" cy="150" r="14"/><text x="845" y="252" class="s">scattered</text>
  <circle class="nh" cx="1084" cy="190" r="25"/><text x="1054" y="252" class="s">single center</text>
  <circle class="nh" cx="955" cy="165" r="12"/><circle class="nh" cx="975" cy="178" r="12"/><circle class="nh" cx="995" cy="165" r="12"/><text x="928" y="132" class="s">clustered centers</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Movement drivers</text>
  <text x="58" y="364" class="eq">cases = g(N_people_moving, distance_HH_NH, layout)</text>
  <rect class="nh" x="75" y="395" width="110" height="44" rx="5"/><text x="96" y="423" class="s">movement count</text>
  <rect class="hh" x="215" y="395" width="110" height="44" rx="5"/><text x="244" y="423" class="s">distance</text>
  <text x="58" y="466" class="s">Reported: number of people moving had the largest effect on case counts.</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Outputs</text>
  <polyline points="454,450 492,440 530,420 568,392 606,362 646,342 710,330" fill="none" stroke="#c45a2b" stroke-width="4"/>
  <text x="454" y="360" class="s">case burden</text>
  <text x="454" y="382" class="s">spatial clustering</text>
  <text x="454" y="470" class="s">Scattered NH produced higher cases than centered/clustered NH.</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Policy estimands</text>
  <rect class="ok" x="830" y="365" width="140" height="50" rx="6"/><text x="853" y="394" class="s">target NH sites</text>
  <rect class="ok" x="1000" y="365" width="135" height="50" rx="6"/><text x="1018" y="394" class="s">mobility-aware control</text>
  <path class="arrow" d="M970 390 L998 390"/>
  <text x="820" y="450" class="s">NH environments act as spreaders between households in urban dengue dynamics.</text>
</svg>
