<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Ghana stillbirth spatiotemporal hotspot analysis</title>
  <desc id="desc">Six-panel schematic showing district stillbirth data, rate construction for 2017-2021, temporal trend analysis, Moran's I and Getis-Ord Gi star hotspot detection, OLS determinant model, and district quality-improvement outputs.</desc>
  <defs>
    <style>
      .bg{fill:#fbf8f8}.panel{fill:#fff;stroke:#b59a9a;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#3a2323}.t{font:14px Arial,sans-serif;fill:#3a2929}.s{font:12px Arial,sans-serif;fill:#604f4f}.eq{font:13px Consolas,monospace;fill:#3a2323}.arrow{stroke:#8a5555;stroke-width:2;fill:none;marker-end:url(#arrow)}.unit{fill:#e2edf8;stroke:#587ca0}.hot{fill:#ef8a62;stroke:#9a4b2d}.cold{fill:#c6dbef;stroke:#4c78a8}.out{fill:#d9ead3;stroke:#628c5b}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8a5555"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">Notation is explanatory for the reported trend, Moran, Gi*, and OLS analyses.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. District-year inputs</text>
  <text x="58" y="145" class="t">Ghana districts, 2017-2021</text>
  <text x="58" y="174" class="eq">SBR_{d,t} = stillbirths_{d,t} / births_{d,t}</text>
  <rect class="unit" x="72" y="205" width="60" height="42"/><rect class="hot" x="138" y="205" width="60" height="42"/><rect class="unit" x="204" y="205" width="60" height="42"/><rect class="hot" x="270" y="205" width="60" height="42"/>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. Time trend</text>
  <polyline points="460,230 505,212 550,220 595,190 640,176 705,162" fill="none" stroke="#9a4b2d" stroke-width="4"/>
  <text x="448" y="150" class="s">Track persistent high-burden districts across five years</text>
  <text x="448" y="255" class="s">Reported high SBR districts include Tema and Akatsi North.</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. Spatial autocorrelation</text>
  <text x="828" y="145" class="eq">Global Moran's I: spatial dependence</text>
  <text x="828" y="176" class="eq">Gi*_d: local hotspot statistic</text>
  <rect class="hot" x="850" y="205" width="70" height="42"/><rect class="hot" x="925" y="205" width="70" height="42"/><rect class="cold" x="1000" y="205" width="70" height="42"/>
  <text x="1085" y="232" class="s">hotspot clusters</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Determinant model</text>
  <text x="58" y="365" class="eq">SBR_d = alpha + X_d beta + eps_d</text>
  <text x="58" y="398" class="s">Reported significant factors:</text>
  <text x="78" y="422" class="s">maternal age, health facilities, beds per facility</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Persistent hotspots</text>
  <rect class="hot" x="455" y="365" width="110" height="52" rx="6"/><text x="484" y="396" class="s">Northern</text>
  <rect class="hot" x="600" y="365" width="130" height="52" rx="6"/><text x="625" y="396" class="s">Greater Accra</text>
  <text x="448" y="455" class="s">Districts recurring over years define priority geographies.</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Quality-improvement estimands</text>
  <rect class="out" x="830" y="362" width="140" height="54" rx="6"/><text x="852" y="394" class="s">obstetric care</text>
  <rect class="out" x="1000" y="362" width="132" height="54" rx="6"/><text x="1023" y="394" class="s">ANC coverage</text>
  <path class="arrow" d="M970 389 L998 389"/>
  <text x="820" y="455" class="s">Spatially target high-burden districts for stillbirth prevention.</text>
</svg>
