<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Uganda leprosy temporal and spatial surveillance analysis</title>
  <desc id="desc">Six-panel schematic showing DHIS2 leprosy case inputs, incidence calculation, Mann-Kendall and Sen slope trend tests, district and regional mapping in QGIS, elimination target indicators, and targeted active-case-detection outputs.</desc>
  <defs>
    <style>
      .bg{fill:#f8fbf7}.panel{fill:#fff;stroke:#91a58d;stroke-width:1.4}.h{font:700 18px Arial,sans-serif;fill:#213622}.t{font:14px Arial,sans-serif;fill:#253827}.s{font:12px Arial,sans-serif;fill:#526552}.eq{font:13px Consolas,monospace;fill:#213622}.arrow{stroke:#557a55;stroke-width:2;fill:none;marker-end:url(#arrow)}.unit{fill:#dbeed8;stroke:#5d8b58}.risk{fill:#ef9a72;stroke:#9a4d28}.target{fill:#dbe7ff;stroke:#536f9d}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#557a55"/></marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="36" y="34" class="h">Original technical schematic - not a reproduced publication figure</text>
  <text x="36" y="56" class="s">The paper reports descriptive temporal tests and QGIS mapping, not a fitted spatial random-effect model.</text>

  <rect class="panel" x="30" y="82" width="360" height="190" rx="6"/>
  <text x="50" y="112" class="h">A. Surveillance panel</text>
  <text x="58" y="145" class="t">Uganda DHIS2, 2020-2024</text>
  <text x="58" y="172" class="s">New cases by age, sex, clinical type, disability grade</text>
  <text x="58" y="205" class="eq">incidence_{d,t} = cases_{d,t} / pop_{d,t}</text>
  <rect class="unit" x="72" y="225" width="72" height="28" rx="4"/><text x="88" y="244" class="s">district</text>
  <rect class="unit" x="165" y="225" width="72" height="28" rx="4"/><text x="180" y="244" class="s">region</text>

  <rect class="panel" x="420" y="82" width="350" height="190" rx="6"/>
  <text x="440" y="112" class="h">B. Temporal trend tests</text>
  <text x="448" y="145" class="eq">Mann-Kendall trend test</text>
  <text x="448" y="175" class="eq">Sen slope estimator</text>
  <polyline points="465,240 520,218 575,230 630,214 700,224" fill="none" stroke="#5d8b58" stroke-width="4"/>
  <text x="448" y="255" class="s">Reported: no significant monotonic trend in key indicators.</text>

  <rect class="panel" x="800" y="82" width="370" height="190" rx="6"/>
  <text x="820" y="112" class="h">C. Spatial maps</text>
  <rect class="unit" x="845" y="145" width="70" height="58"/><rect class="risk" x="920" y="145" width="70" height="58"/><rect class="unit" x="995" y="145" width="70" height="58"/>
  <rect class="unit" x="845" y="208" width="70" height="42"/><rect class="risk" x="920" y="208" width="70" height="42"/><rect class="risk" x="995" y="208" width="70" height="42"/>
  <text x="1080" y="165" class="s">QGIS district</text><text x="1080" y="184" class="s">and region views</text>
  <text x="1080" y="225" class="s">West Nile burden</text>

  <rect class="panel" x="30" y="302" width="360" height="190" rx="6"/>
  <text x="50" y="332" class="h">D. Elimination indicators</text>
  <rect class="target" x="62" y="360" width="135" height="46" rx="6"/><text x="82" y="389" class="s">child cases &lt;3%</text>
  <rect class="target" x="220" y="360" width="135" height="46" rx="6"/><text x="246" y="389" class="s">G2D &lt;5%</text>
  <text x="58" y="440" class="s">Reported: child cases 14%; G2D 21%; multibacillary disease 86%.</text>

  <rect class="panel" x="420" y="302" width="350" height="190" rx="6"/>
  <text x="440" y="332" class="h">E. Risk interpretation</text>
  <text x="448" y="365" class="eq">stable incidence + child cases + G2D</text>
  <text x="448" y="392" class="eq">=> ongoing transmission and delayed diagnosis</text>
  <path class="arrow" d="M458 425 L710 425"/>
  <text x="515" y="448" class="s">prioritize persistent high-burden districts</text>

  <rect class="panel" x="800" y="302" width="370" height="190" rx="6"/>
  <text x="820" y="332" class="h">F. Program outputs</text>
  <rect class="risk" x="838" y="365" width="130" height="52" rx="6"/><text x="860" y="396" class="s">West Nile focus</text>
  <rect class="target" x="995" y="365" width="130" height="52" rx="6"/><text x="1010" y="396" class="s">contact tracing</text>
  <path class="arrow" d="M968 391 L993 391"/>
  <text x="820" y="455" class="s">Outputs support active case detection in high-burden areas.</text>
</svg>
