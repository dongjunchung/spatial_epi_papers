<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for the Entomological Adaptive Sampling Framework malaria vector surveillance evaluation</title>
  <desc id="desc">Six-panel original schematic showing routine versus adaptive vector sampling, spatiotemporal mosquito dynamics, Ghana and Mozambique pilot inputs, microcosting, yield and ICER outcomes, and malaria-program decision use. This is not a reproduced publication figure.</desc>
  <style>
    .bg{fill:#f8fbff}.panel{fill:#fff;stroke:#b8c8df;stroke-width:2;rx:8}.h{font:700 25px Arial,sans-serif;fill:#17304d}.sh{font:700 18px Arial,sans-serif;fill:#17304d}.t{font:15px Arial,sans-serif;fill:#26384f}.s{font:13px Arial,sans-serif;fill:#55677f}.eq{font:15px Consolas,monospace;fill:#17304d}.a{stroke:#32618b;stroke-width:3;fill:none;marker-end:url(#arrow)}.routine{fill:#d8dfeb;stroke:#8394ad}.adaptive{fill:#91c7a9;stroke:#438263}.cost{fill:#f1c77b;stroke:#9a7328}.out{fill:#86acd4;stroke:#3c638d}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#32618b"/></marker></defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="42" y="48" class="h">EASF malaria vector surveillance: adaptive sampling plus economic evaluation</text>
  <text x="42" y="74" class="s">Original technical schematic for Avanceña et al. Malaria Journal, 2026. Algorithm notation is explanatory where details are not in the abstract.</text>

  <rect class="panel" x="40" y="105" width="470" height="245"/>
  <text class="sh" x="64" y="137">A. Comparator designs</text>
  <rect x="85" y="175" width="160" height="95" class="routine" rx="8"/><text class="t" x="112" y="208">routine</text><text class="s" x="102" y="232">fixed or purposive</text>
  <rect x="300" y="175" width="160" height="95" class="adaptive" rx="8"/><text class="t" x="334" y="208">EASF</text><text class="s" x="322" y="232">adaptive sites</text>
  <path class="a" d="M245 222 L300 222"/>
  <text class="s" x="70" y="315">Reported rationale: conventional fixed-site sampling may be biased or nonrepresentative.</text>

  <rect class="panel" x="565" y="105" width="470" height="245"/>
  <text class="sh" x="589" y="137">B. Spatiotemporal vector dynamics</text>
  <rect x="610" y="172" width="120" height="85" class="out" rx="8"/><text class="t" x="635" y="205">trap yield</text><text class="s" x="640" y="228">y(s,t)</text>
  <rect x="780" y="172" width="120" height="85" class="adaptive" rx="8"/><text class="t" x="810" y="205">season</text><text class="s" x="812" y="228">t</text>
  <rect x="875" y="256" width="120" height="45" class="cost" rx="8"/><text class="s" x="895" y="284">next sites</text>
  <path class="a" d="M730 214 L780 214"/><path class="a" d="M840 257 L875 278"/>
  <text class="eq" x="610" y="305">choose S_next from recent y(s,t) and vector risk</text>
  <text class="s" x="590" y="330">Reported: EASF optimizes sampling based on spatiotemporal vector dynamics.</text>

  <rect class="panel" x="1090" y="105" width="470" height="245"/>
  <text class="sh" x="1114" y="137">C. Pilot implementation data</text>
  <rect x="1135" y="175" width="175" height="88" class="adaptive" rx="8"/><text class="t" x="1165" y="207">Ghana</text><text class="s" x="1158" y="232">Jul 2023-2024</text>
  <rect x="1340" y="175" width="175" height="88" class="adaptive" rx="8"/><text class="t" x="1370" y="207">Mozambique</text><text class="s" x="1360" y="232">Sep 2022-Aug 2024</text>
  <text class="s" x="1120" y="315">Reported: prospective pilot cost and collection-yield data.</text>

  <rect class="panel" x="40" y="405" width="470" height="245"/>
  <text class="sh" x="64" y="437">D. Cost model</text>
  <rect x="88" y="480" width="170" height="55" class="cost" rx="8"/><text class="t" x="112" y="512">microcosting</text>
  <rect x="295" y="462" width="150" height="40" class="routine" rx="6"/><text class="s" x="315" y="488">routine cost</text>
  <rect x="295" y="532" width="150" height="40" class="adaptive" rx="6"/><text class="s" x="325" y="558">EASF cost</text>
  <path class="a" d="M258 508 L295 482"/><path class="a" d="M258 508 L295 552"/>
  <text class="s" x="70" y="628">Reported EASF total costs: Ghana $144,688; Mozambique $48,646.</text>

  <rect class="panel" x="565" y="405" width="470" height="245"/>
  <text class="sh" x="589" y="437">E. Yield and ICER outputs</text>
  <line x1="620" y1="585" x2="968" y2="585" stroke="#7d91aa"/><line x1="620" y1="482" x2="620" y2="585" stroke="#7d91aa"/>
  <rect x="675" y="530" width="52" height="55" class="adaptive"/><rect x="800" y="504" width="52" height="81" class="adaptive"/>
  <text class="s" x="654" y="612">+0.75 Ghana</text><text class="s" x="770" y="612">+1.12 Moz.</text>
  <text class="eq" x="600" y="468">ICER = (cost_EASF - cost_routine) / (yield gain)</text>
  <text class="s" x="590" y="628">Reported ICERs per additional mosquito: $4.98 Ghana; $30.38 Mozambique.</text>

  <rect class="panel" x="1090" y="405" width="470" height="245"/>
  <text class="sh" x="1114" y="437">F. Malaria-program use</text>
  <rect x="1130" y="480" width="175" height="54" class="out" rx="8"/><text class="t" x="1158" y="512">better vector data</text>
  <rect x="1340" y="480" width="175" height="54" class="cost" rx="8"/><text class="t" x="1365" y="512">budget impact</text>
  <rect x="1235" y="565" width="175" height="54" class="adaptive" rx="8"/><text class="t" x="1256" y="597">targeted decisions</text>
  <path class="a" d="M1218 534 L1275 565"/><path class="a" d="M1428 534 L1370 565"/>
  <text class="s" x="1120" y="628">Reported next step: demonstrate downstream value for NMP decisions and transmission.</text>

  <rect x="42" y="705" width="1518" height="210" fill="#edf4fb" stroke="#b8c8df" rx="8"/>
  <text class="sh" x="70" y="740">Caution on specificity</text>
  <text class="t" x="70" y="772">The abstract names EASF and spatiotemporal vector dynamics but does not disclose the exact adaptive rule.</text>
  <text class="t" x="70" y="802">Panel B therefore uses generic adaptive-sampling notation to represent the reported design goal.</text>
</svg>
