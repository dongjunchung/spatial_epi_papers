<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Oropouche virus phylogeography and climate context</title>
  <desc id="desc">Six-panel original schematic showing febrile surveillance in Leticia, genome sequencing, two Oropouche virus lineages, Bayesian skyline and phylogeographic analysis, ocean climate transition timing, and surveillance outputs. This is not a reproduced publication figure.</desc>
  <style>
    .bg{fill:#f7faf9}.panel{fill:#fff;stroke:#b8c7c1;stroke-width:2;rx:8}.h{font:700 25px Arial,sans-serif;fill:#173b33}.sh{font:700 18px Arial,sans-serif;fill:#173b33}.t{font:15px Arial,sans-serif;fill:#22342f}.s{font:13px Arial,sans-serif;fill:#46615a}.eq{font:15px Consolas,monospace;fill:#173b33}.a{stroke:#316b83;stroke-width:3;fill:none;marker-end:url(#arrow)}.old{fill:#f3c969;stroke:#8c6a11}.new{fill:#79b7b2;stroke:#286760}.red{fill:#ee8a75;stroke:#9b3f2f}.blue{fill:#86add6;stroke:#3d6794}.grid{stroke:#d9e3df;stroke-width:1}
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L9,3 L0,6 Z" fill="#316b83"/></marker></defs>
  <rect class="bg" width="1600" height="980"/>
  <text x="42" y="48" class="h">Oropouche virus in the Colombian Amazon: genomic phylogeography plus climate timing</text>
  <text x="42" y="74" class="s">Original technical schematic for Restrepo et al. PLOS Neglected Tropical Diseases, 2026. Notation is explanatory and may differ from the paper.</text>

  <rect class="panel" x="40" y="105" width="470" height="245"/>
  <text class="sh" x="64" y="137">A. Febrile surveillance input</text>
  <circle cx="145" cy="215" r="54" fill="#e6f0ef" stroke="#8fb0aa" stroke-width="3"/>
  <text class="t" x="105" y="208">Leticia</text><text class="s" x="95" y="229">Colombian Amazon</text>
  <rect x="238" y="166" width="185" height="44" class="blue" rx="6"/><text class="t" x="257" y="194">RT-qPCR cases</text>
  <rect x="238" y="230" width="185" height="44" class="new" rx="6"/><text class="t" x="260" y="258">41 OROV+</text>
  <path class="a" d="M200 214 C220 204,220 194,238 188"/>
  <text class="s" x="62" y="315">Reported: 2024 outbreak surveillance; 41 positives in Leticia.</text>

  <rect class="panel" x="565" y="105" width="470" height="245"/>
  <text class="sh" x="589" y="137">B. Genome and lineage layer</text>
  <rect x="600" y="168" width="135" height="70" class="blue" rx="6"/><text class="t" x="628" y="196">NGS</text><text class="s" x="615" y="218">local genomes</text>
  <rect x="782" y="150" width="190" height="54" class="old" rx="6"/><text class="t" x="805" y="181">PE/CO/EC 2008-2021</text>
  <rect x="782" y="230" width="190" height="54" class="new" rx="6"/><text class="t" x="818" y="262">BR 2015-2024</text>
  <path class="a" d="M735 202 L782 178"/><path class="a" d="M735 202 L782 256"/>
  <text class="s" x="595" y="315">Reported: 15 sequences in historic lineage; 26 in reassortant lineage.</text>

  <rect class="panel" x="1090" y="105" width="470" height="245"/>
  <text class="sh" x="1114" y="137">C. Bayesian phylogeography</text>
  <path d="M1170 282 L1250 240 L1320 270 L1410 185" stroke="#274d5b" stroke-width="3" fill="none"/>
  <circle cx="1170" cy="282" r="10" class="old"/><circle cx="1250" cy="240" r="10" class="old"/><circle cx="1320" cy="270" r="10" class="new"/><circle cx="1410" cy="185" r="10" class="new"/>
  <path d="M1192 205 C1235 160,1300 160,1368 205" stroke="#9bb8b2" stroke-width="2" fill="none"/>
  <text class="eq" x="1125" y="174">p(tree, lineage, Ne(t) | genomes)</text>
  <text class="s" x="1122" y="315">Reported: Bayesian skyline analysis of 627 regional OROV genomes.</text>

  <rect class="panel" x="40" y="405" width="470" height="245"/>
  <text class="sh" x="64" y="437">D. Climate time-series context</text>
  <line x1="86" y1="585" x2="448" y2="585" stroke="#6d807b"/><line x1="86" y1="470" x2="86" y2="585" stroke="#6d807b"/>
  <path d="M95 550 C150 520,180 480,230 515 S310 595,358 535 S420 485,445 500" stroke="#316b83" stroke-width="4" fill="none"/>
  <line x1="190" y1="470" x2="190" y2="590" stroke="#ee8a75" stroke-width="3" stroke-dasharray="8 6"/><line x1="386" y1="470" x2="386" y2="590" stroke="#ee8a75" stroke-width="3" stroke-dasharray="8 6"/>
  <text class="s" x="132" y="610">La Niña to neutral</text><text class="s" x="335" y="610">El Niño to neutral</text>
  <text class="s" x="70" y="628">Reported: outbreak peaks coincided with major ocean-temperature transitions.</text>

  <rect class="panel" x="565" y="405" width="470" height="245"/>
  <text class="sh" x="589" y="437">E. Inferred epidemic dynamics</text>
  <rect x="610" y="492" width="330" height="28" class="old"/><rect x="610" y="548" width="330" height="28" class="new"/>
  <rect x="610" y="492" width="115" height="28" fill="#f8e6a6" stroke="#8c6a11"/><rect x="610" y="548" width="255" height="28" fill="#a8d5d1" stroke="#286760"/>
  <text class="s" x="612" y="485">Historic lineage declining</text><text class="s" x="612" y="542">Reassortant lineage expanding</text>
  <text class="eq" x="607" y="618">relative lineage frequency(t) -> displacement by 2023</text>

  <rect class="panel" x="1090" y="405" width="470" height="245"/>
  <text class="sh" x="1114" y="437">F. Public-health estimands</text>
  <rect x="1130" y="482" width="160" height="48" class="blue" rx="6"/><text class="t" x="1152" y="512">lineage alerts</text>
  <rect x="1340" y="482" width="160" height="48" class="new" rx="6"/><text class="t" x="1365" y="512">climate watch</text>
  <rect x="1235" y="568" width="160" height="48" class="red" rx="6"/><text class="t" x="1255" y="598">risk response</text>
  <path class="a" d="M1290 506 L1340 506"/><path class="a" d="M1210 530 L1260 568"/><path class="a" d="M1420 530 L1365 568"/>
  <text class="s" x="1120" y="628">Use: integrate genomic surveillance with climate monitoring for outbreak prediction.</text>

  <rect x="42" y="705" width="1518" height="210" fill="#eef5f3" stroke="#b8c7c1" rx="8"/>
  <text class="sh" x="70" y="740">Caution on specificity</text>
  <text class="t" x="70" y="772">The accessible abstract reports surveillance, NGS, phylogenetic/phylogeographic analysis, Bayesian skyline analysis, and time-series climate comparison.</text>
  <text class="t" x="70" y="802">Panel equations and tree graphics are explanatory notation for those reported components, not extracted from the publication.</text>
</svg>
