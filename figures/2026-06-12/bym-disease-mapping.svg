<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Besag-York-Mollie Bayesian disease mapping model</title>
  <desc id="desc">Observed disease counts and expected counts define a Poisson relative-risk likelihood. Log risk combines an intercept, a structured intrinsic CAR effect, and an independent Gaussian effect. Neighborhood smoothing produces posterior risk maps but creates scaling, identifiability, and boundary-smoothing concerns addressed by later BYM2 models.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
    <style>.h{font:700 30px Arial;fill:#172554}.sh{font:700 20px Arial;fill:#1e293b}.tx{font:16px Arial;fill:#334155}.sm{font:14px Arial;fill:#475569}.eq{font:15px 'Courier New';fill:#312e81}.b{stroke-width:2.5}.ar{fill:none;stroke:#475569;stroke-width:3;marker-end:url(#a)}</style>
  </defs>
  <rect width="1600" height="980" fill="#f8fafc"/>
  <text x="800" y="48" text-anchor="middle" class="h">BYM: separating spatial structure from local heterogeneity</text>

  <rect x="30" y="82" width="390" height="340" rx="18" fill="#eff6ff" stroke="#2563eb" class="b"/>
  <text x="225" y="118" text-anchor="middle" class="sh">1. Areal disease data</text>
  <text x="60" y="165" class="eq">Y[i] = observed cases</text>
  <text x="60" y="200" class="eq">E[i] = expected cases</text>
  <text x="60" y="235" class="eq">W[i,j] = 1 if areas share a boundary</text>
  <g transform="translate(95 275)" stroke="#fff" stroke-width="4">
    <path d="M0 0h75l22 45-22 50H0L-12 43z" fill="#bfdbfe"/><path d="M82 -5h78l24 48-25 52H70l27-50z" fill="#60a5fa"/>
    <path d="M8 100h75l20 52-28 47H-7l7-55z" fill="#dbeafe"/><path d="M92 98h78l19 54-25 48H75l28-49z" fill="#93c5fd"/>
  </g>
  <text x="305" y="307" class="tx">Counts</text><text x="305" y="342" class="tx">Population offset</text><text x="305" y="377" class="tx">Adjacency graph</text>
  <path d="M420 250h55" class="ar"/>

  <rect x="475" y="82" width="570" height="340" rx="18" fill="#eef2ff" stroke="#4f46e5" class="b"/>
  <text x="760" y="118" text-anchor="middle" class="sh">2. Poisson relative-risk likelihood</text>
  <text x="515" y="170" class="eq">Y[i] | theta[i] ~ Poisson(E[i] * theta[i])</text>
  <text x="515" y="215" class="eq">log theta[i] = alpha + u[i] + v[i]</text>
  <rect x="520" y="265" width="215" height="90" rx="12" fill="#ddd6fe"/>
  <text x="627" y="298" text-anchor="middle" class="tx">u[i]</text><text x="627" y="327" text-anchor="middle" class="sm">spatially structured</text>
  <rect x="780" y="265" width="215" height="90" rx="12" fill="#fee2e2"/>
  <text x="887" y="298" text-anchor="middle" class="tx">v[i]</text><text x="887" y="327" text-anchor="middle" class="sm">unstructured noise</text>
  <text x="515" y="390" class="sm">theta[i] is the area-specific standardized relative risk</text>
  <path d="M1045 250h55" class="ar"/>

  <rect x="1100" y="82" width="470" height="340" rx="18" fill="#faf5ff" stroke="#7c3aed" class="b"/>
  <text x="1335" y="118" text-anchor="middle" class="sh">3. Prior components</text>
  <text x="1135" y="165" class="tx">Intrinsic CAR prior</text>
  <text x="1135" y="200" class="eq">u[i] | u[-i],tauU ~ Normal(ubar[N_i],</text>
  <text x="1135" y="230" class="eq">                          1/(n[i]*tauU))</text>
  <text x="1135" y="275" class="tx">Independent heterogeneity</text>
  <text x="1135" y="310" class="eq">v[i] ~ Normal(0, 1/tauV)</text>
  <text x="1135" y="355" class="tx">Constraint</text>
  <text x="1135" y="387" class="eq">sum_i u[i] = 0</text>
  <path d="M800 422v50" class="ar"/>

  <rect x="70" y="475" width="700" height="260" rx="18" fill="#fefce8" stroke="#ca8a04" class="b"/>
  <text x="420" y="512" text-anchor="middle" class="sh">4. Information flow</text>
  <text x="105" y="555" class="tx">Raw risk</text><text x="105" y="588" class="eq">SMR[i] = Y[i] / E[i]</text>
  <path d="M285 580h75" class="ar"/>
  <text x="385" y="555" class="tx">Neighbor borrowing</text><text x="385" y="588" class="eq">u[i] pulled toward adjacent u[j]</text>
  <path d="M600 580h75" class="ar"/>
  <text x="105" y="655" class="tx">Local deviation</text><text x="105" y="688" class="eq">v[i] absorbs non-spatial excess</text>
  <text x="385" y="655" class="tx">Posterior compromise</text><text x="385" y="688" class="eq">p(theta[i] | Y,E,W)</text>

  <rect x="830" y="475" width="700" height="260" rx="18" fill="#f0fdf4" stroke="#16a34a" class="b"/>
  <text x="1180" y="512" text-anchor="middle" class="sh">5. Disease-mapping outputs</text>
  <text x="865" y="558" class="eq">E[theta[i] | data]</text><text x="865" y="592" class="tx">smoothed relative-risk map</text>
  <text x="865" y="635" class="eq">Pr(theta[i] &gt; c | data)</text><text x="865" y="669" class="tx">exceedance-probability map</text>
  <text x="1185" y="558" class="eq">CrI(theta[i])</text><text x="1185" y="592" class="tx">area-level uncertainty</text>
  <text x="1185" y="635" class="eq">Var(u), Var(v)</text><text x="1185" y="669" class="tx">structured vs unstructured variation</text>
  <path d="M800 735v45" class="ar"/>

  <rect x="115" y="783" width="1370" height="145" rx="18" fill="#fff7ed" stroke="#ea580c" class="b"/>
  <text x="800" y="820" text-anchor="middle" class="sh">6. Known limitations and BYM2 response</text>
  <text x="155" y="862" class="tx">Original BYM: confounded u/v variances, graph-dependent scale, improper ICAR prior, boundary oversmoothing</text>
  <text x="155" y="899" class="eq">BYM2: b[i] = (1/sqrt(tau)) * (sqrt(1-phi) v[i] + sqrt(phi) u*[i])</text>
  <text x="1120" y="899" class="sm">total variance tau; spatial fraction phi</text>
  <text x="800" y="958" text-anchor="middle" class="sm">Original technical schematic of the standard BYM disease-mapping formulation; not a paper figure</text>
</svg>
