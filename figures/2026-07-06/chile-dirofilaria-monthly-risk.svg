<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for monthly Dirofilaria immitis infection risk in Chile</title>
  <desc id="desc">Six-panel schematic showing mosquito-vector and climate inputs, MaxEnt ecological niche modeling, monthly parasite-generation risk, pet serology validation, climate projection, and One Health prevention outputs. This is an original schematic, not a reproduced publication figure.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2b2d42"/></marker>
  <style>.bg{fill:#f7f7fb}.panel{fill:#fff;stroke:#687083;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#24283b}.sub{font:13px Arial,sans-serif;fill:#24283b}.small{font:12px Arial,sans-serif;fill:#4b5563}.eq{font:13px Consolas,monospace;fill:#24283b}.risk{fill:#ef476f;stroke:#9d174d}.mid{fill:#ffd166;stroke:#b7791f}.low{fill:#8ecae6;stroke:#277da1}.green{fill:#c7f9cc;stroke:#40916c}.line{stroke:#2b2d42;stroke-width:1.8;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1120" height="760"/>
  <text x="32" y="38" class="head">Chile Dirofilaria immitis monthly infection-risk mapping</text>
  <text x="32" y="60" class="small">Original technical schematic - explanatory notation may differ from the paper</text>
  <rect x="32" y="86" width="330" height="190" class="panel"/><text x="52" y="116" class="head">A. Occurrence and climate inputs</text><text x="52" y="142" class="sub">Mosquito-vector presence plus bioclimatic variables</text>
  <circle cx="92" cy="196" r="8" class="risk"/><circle cx="126" cy="216" r="8" class="mid"/><circle cx="170" cy="180" r="8" class="low"/><rect x="220" y="170" width="88" height="54" class="green"/><text x="237" y="202" class="small">climate</text><text x="62" y="254" class="eq">features = bioclimate + human footprint + geography</text>
  <rect x="394" y="86" width="330" height="190" class="panel"/><text x="414" y="116" class="head">B. MaxEnt niche model</text><text x="414" y="142" class="sub">Habitat suitability for monthly transmission risk</text>
  <text x="428" y="184" class="eq">suitability(s,m) = MaxEnt(X_s,m)</text><text x="428" y="214" class="eq">AUC &gt; 0.89</text><rect x="530" y="230" width="128" height="28" class="mid"/><text x="545" y="249" class="small">human footprint highest contribution</text>
  <rect x="756" y="86" width="330" height="190" class="panel"/><text x="776" y="116" class="head">C. Monthly parasite risk</text><text x="776" y="142" class="sub">Thermal limits shape seasonal potential generations</text>
  <polyline points="792,236 832,222 872,170 912,150 952,168 992,218 1032,238" fill="none" stroke="#ef476f" stroke-width="3"/><line x1="792" y1="238" x2="1032" y2="238" stroke="#24283b"/><text x="800" y="260" class="small">peak risk: austral summer Jan-Feb; near-zero in winter</text>
  <rect x="32" y="310" width="330" height="190" class="panel"/><text x="52" y="340" class="head">D. Serological validation</text><text x="52" y="366" class="sub">323 pets from north-central Chile</text>
  <rect x="82" y="397" width="84" height="58" class="risk"/><text x="104" y="431" class="small">cats</text><rect x="206" y="417" width="84" height="38" class="mid"/><text x="228" y="441" class="small">dogs</text><text x="66" y="486" class="eq">prevalence: 12.9% cats; 5.5% dogs; positives in high-risk areas</text>
  <rect x="394" y="310" width="330" height="190" class="panel"/><text x="414" y="340" class="head">E. Future expansion</text><text x="414" y="366" class="sub">SSP climate projections to 2100</text>
  <rect x="432" y="416" width="78" height="42" class="mid"/><rect x="536" y="392" width="78" height="66" class="risk"/><rect x="640" y="368" width="58" height="90" class="risk"/><text x="422" y="486" class="eq">suitable habitat gain: +62.8% (SSP1-2.6) to +103.5% (SSP5-8.5)</text>
  <rect x="756" y="310" width="330" height="190" class="panel"/><text x="776" y="340" class="head">F. One Health prevention</text><text x="776" y="366" class="sub">Dynamic maps support chemoprophylaxis and active surveillance</text>
  <rect x="800" y="394" width="108" height="64" class="low"/><text x="815" y="422" class="small">monthly</text><text x="821" y="441" class="small">alerts</text><rect x="940" y="394" width="108" height="64" class="green"/><text x="958" y="422" class="small">targeted</text><text x="955" y="441" class="small">prevention</text><text x="790" y="486" class="eq">estimand = risk class(s,m,scenario)</text>
  <path d="M362 181 H394" class="line"/><path d="M724 181 H756" class="line"/><path d="M922 276 V310" class="line"/><path d="M756 407 H724" class="line"/><path d="M394 407 H362" class="line"/>
</svg>
