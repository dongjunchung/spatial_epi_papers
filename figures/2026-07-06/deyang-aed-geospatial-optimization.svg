<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for geospatial AED optimization in Deyang, China</title>
  <desc id="desc">Six-panel schematic showing OHCA cases, existing AED supply, spatial clustering, Ga2SFCA accessibility, maximal covering location optimization, and coverage scenarios. This is an original schematic, not a reproduced publication figure.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#30475e"/></marker>
  <style>.bg{fill:#f8f6f1}.panel{fill:white;stroke:#5f6c7b;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#23313f}.sub{font:13px Arial,sans-serif;fill:#23313f}.small{font:12px Arial,sans-serif;fill:#394b59}.eq{font:13px Consolas,monospace;fill:#1f2d3a}.case{fill:#e76f51}.aed{fill:#2a9d8f}.phci{fill:#f4a261}.road{stroke:#8d99ae;stroke-width:5;fill:none;stroke-linecap:round}.line{stroke:#30475e;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.box{fill:#edf6f9;stroke:#457b9d;rx:5}.warn{fill:#fde2d7;stroke:#c45b43;rx:5}</style></defs>
  <rect class="bg" width="1120" height="760"/>
  <text x="32" y="38" class="head">Deyang PHCI-embedded AED geospatial optimization</text>
  <text x="32" y="60" class="small">Original technical schematic - explanatory notation may differ from the paper</text>
  <rect x="32" y="86" width="330" height="190" class="panel"/><text x="52" y="116" class="head">A. Demand surface</text><text x="52" y="142" class="sub">3,273 OHCA cases, 2021-2023</text>
  <path d="M70 236 C95 190,145 172,188 198 S278 187,322 136" class="road"/><circle cx="95" cy="215" r="7" class="case"/><circle cx="132" cy="196" r="7" class="case"/><circle cx="178" cy="205" r="7" class="case"/><circle cx="237" cy="190" r="7" class="case"/><circle cx="292" cy="155" r="7" class="case"/><text x="68" y="254" class="small">residential areas: 82.22% of cases</text>
  <rect x="394" y="86" width="330" height="190" class="panel"/><text x="414" y="116" class="head">B. Existing supply gap</text><text x="414" y="142" class="sub">Current AEDs poorly matched to residential OHCA demand</text>
  <circle cx="448" cy="212" r="8" class="aed"/><circle cx="504" cy="180" r="8" class="aed"/><circle cx="612" cy="206" r="8" class="aed"/><circle cx="662" cy="155" r="8" class="case"/><circle cx="682" cy="182" r="8" class="case"/><circle cx="640" cy="242" r="8" class="case"/><text x="420" y="252" class="eq">covered within 500 m road network = 31.87%</text>
  <rect x="756" y="86" width="330" height="190" class="panel"/><text x="776" y="116" class="head">C. Spatial clustering</text><text x="776" y="142" class="sub">Global/Local Moran's I and Getis-Ord Gi*</text>
  <rect x="808" y="166" width="72" height="72" fill="#fee8c8" stroke="#d95f0e"/><rect x="890" y="166" width="72" height="72" fill="#fdbb84" stroke="#d95f0e"/><rect x="972" y="166" width="72" height="72" fill="#e34a33" stroke="#b30000"/><text x="795" y="252" class="eq">Moran's I = 0.38-0.49, p &lt; 0.01</text>
  <rect x="32" y="310" width="330" height="190" class="panel"/><text x="52" y="340" class="head">D. Accessibility model</text><text x="52" y="366" class="sub">Gaussian 2-step floating catchment area</text>
  <circle cx="135" cy="424" r="64" fill="#d8f3dc" stroke="#40916c" stroke-dasharray="6 4"/><rect x="116" y="405" width="38" height="38" class="phci"/><text x="122" y="429" class="small">P</text><circle cx="98" cy="390" r="7" class="case"/><circle cx="158" cy="472" r="7" class="case"/><circle cx="187" cy="418" r="7" class="case"/><text x="218" y="414" class="eq">A_i = sum_j S_j W(d_ij) / D_j</text><text x="218" y="436" class="small">road distance, 500 m catchment</text>
  <rect x="394" y="310" width="330" height="190" class="panel"/><text x="414" y="340" class="head">E. Location optimization</text><text x="414" y="366" class="sub">PHCIs are candidate nodes for outdoor AED cabinets</text>
  <rect x="430" y="393" width="120" height="70" class="box"/><text x="449" y="423" class="small">candidate</text><text x="461" y="442" class="small">PHCIs</text><path d="M554 428 H604" class="line"/><rect x="608" y="393" width="90" height="70" class="warn"/><text x="630" y="423" class="small">MCLP</text><text x="622" y="442" class="small">choose k</text><text x="420" y="486" class="eq">max sum_i demand_i z_i subject to selected PHCI nodes</text>
  <rect x="756" y="310" width="330" height="190" class="panel"/><text x="776" y="340" class="head">F. Scenario outputs</text><text x="776" y="366" class="sub">Complete redistribution vs incremental expansion</text>
  <rect x="800" y="396" width="98" height="52" class="box"/><text x="812" y="426" class="small">+100 AEDs</text><rect x="930" y="396" width="98" height="52" class="warn"/><text x="942" y="426" class="small">+200 AEDs</text><text x="794" y="474" class="eq">&gt;50% coverage threshold under two deployment strategies</text>
  <path d="M362 181 H394" class="line"/><path d="M724 181 H756" class="line"/><path d="M922 276 V310" class="line"/><path d="M756 407 H724" class="line"/><path d="M394 407 H362" class="line"/>
</svg>
