<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Benin malaria SPDE risk stratification</title>
  <desc id="desc">Six-panel schematic showing DHS rapid diagnostic test prevalence data, remote-sensing covariates, SPDE geostatistical model, posterior malaria risk map, validation, and intervention prioritization. This is an original schematic, not a reproduced publication figure.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#264653"/></marker>
  <style>.bg{fill:#f4f7f2}.panel{fill:#fffdf8;stroke:#5f7561;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#223322}.sub{font:13px Arial,sans-serif;fill:#223322}.small{font:12px Arial,sans-serif;fill:#3f513f}.eq{font:13px Consolas,monospace;fill:#223322}.hot{fill:#e76f51;stroke:#9d2f20}.warm{fill:#f4a261;stroke:#b66b2c}.cool{fill:#a7c957;stroke:#6a994e}.blue{fill:#d8eefe;stroke:#457b9d}.line{stroke:#264653;stroke-width:1.8;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1120" height="760"/>
  <text x="32" y="38" class="head">Benin malaria environmental SPDE risk model</text>
  <text x="32" y="60" class="small">Original technical schematic - explanatory notation may differ from the paper</text>
  <rect x="32" y="86" width="330" height="190" class="panel"/><text x="52" y="116" class="head">A. Prevalence observations</text><text x="52" y="142" class="sub">DHS rapid diagnostic test data at sampled locations</text>
  <circle cx="90" cy="190" r="8" class="hot"/><circle cx="132" cy="220" r="8" class="warm"/><circle cx="178" cy="174" r="8" class="cool"/><circle cx="220" cy="236" r="8" class="hot"/><circle cx="288" cy="194" r="8" class="warm"/><text x="62" y="258" class="eq">Y_j ~ Binomial(n_j, p(s_j))</text>
  <rect x="394" y="86" width="330" height="190" class="panel"/><text x="414" y="116" class="head">B. Environmental covariates</text><text x="414" y="142" class="sub">Remote sensing and surface variables</text>
  <rect x="424" y="174" width="75" height="46" class="warm"/><text x="434" y="201" class="small">temp</text><rect x="522" y="174" width="75" height="46" class="cool"/><text x="538" y="201" class="small">NDVI</text><rect x="620" y="174" width="75" height="46" class="blue"/><text x="632" y="201" class="small">soil</text><text x="424" y="252" class="eq">X(s) = temperature + vegetation + soil + built/bare surfaces</text>
  <rect x="756" y="86" width="330" height="190" class="panel"/><text x="776" y="116" class="head">C. SPDE latent field</text><text x="776" y="142" class="sub">Continuous spatial dependence represented on a mesh</text>
  <path d="M802 228 L862 166 L928 224 L988 168 L1042 232" fill="none" stroke="#457b9d" stroke-width="2"/><path d="M802 168 L862 226 L928 166 L988 224 L1042 168" fill="none" stroke="#457b9d" stroke-width="2"/><text x="790" y="254" class="eq">logit p(s) = beta X(s) + w(s),  w(s) from SPDE</text>
  <rect x="32" y="310" width="330" height="190" class="panel"/><text x="52" y="340" class="head">D. Posterior risk surface</text><text x="52" y="366" class="sub">Northern and central hotspots identified</text>
  <rect x="82" y="386" width="64" height="64" class="hot"/><rect x="146" y="386" width="64" height="64" class="warm"/><rect x="210" y="386" width="64" height="64" class="cool"/><rect x="82" y="450" width="64" height="28" class="warm"/><rect x="146" y="450" width="64" height="28" class="hot"/><rect x="210" y="450" width="64" height="28" class="cool"/><text x="64" y="492" class="small">hotspots guide intensified malaria control</text>
  <rect x="394" y="310" width="330" height="190" class="panel"/><text x="414" y="340" class="head">E. Validation</text><text x="414" y="366" class="sub">ROC analysis checks predictive discrimination</text>
  <path d="M430 462 C470 410,520 386,580 374 S670 354,700 342" fill="none" stroke="#e76f51" stroke-width="3"/><line x1="430" y1="462" x2="700" y2="462" stroke="#223322"/><line x1="430" y1="462" x2="430" y2="342" stroke="#223322"/><text x="446" y="486" class="eq">sensitivity = 0.619; specificity = 1.000</text>
  <rect x="756" y="310" width="330" height="190" class="panel"/><text x="776" y="340" class="head">F. Resource prioritization</text><text x="776" y="366" class="sub">Risk-stratified targeting for elimination</text>
  <rect x="798" y="394" width="110" height="64" class="hot"/><text x="818" y="421" class="small">priority</text><text x="824" y="440" class="small">zones</text><rect x="940" y="394" width="110" height="64" class="blue"/><text x="960" y="421" class="small">nets, IRS,</text><text x="960" y="440" class="small">testing</text><text x="790" y="486" class="eq">policy estimand = Pr[p(s) &gt; risk threshold | data]</text>
  <path d="M362 181 H394" class="line"/><path d="M724 181 H756" class="line"/><path d="M922 276 V310" class="line"/><path d="M756 407 H724" class="line"/><path d="M394 407 H362" class="line"/>
</svg>
