<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Bayesian spatial Poisson modeling of rurality, deprivation, and mortality in Japan</title>
  <desc id="desc">Six-panel schematic showing municipality mortality counts, rurality and deprivation indices, Bayesian spatial Poisson models, cause-specific rate ratios, attenuation after deprivation adjustment, and disparity policy outputs. This is an original schematic, not a reproduced publication figure.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#334155"/></marker>
  <style>.bg{fill:#f7f4ef}.panel{fill:#fffefa;stroke:#64748b;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#1f2937}.sub{font:13px Arial,sans-serif;fill:#1f2937}.small{font:12px Arial,sans-serif;fill:#475569}.eq{font:13px Consolas,monospace;fill:#1f2937}.rural{fill:#dcfce7;stroke:#16a34a}.dep{fill:#fee2e2;stroke:#ef4444}.sp{fill:#dbeafe;stroke:#2563eb}.line{stroke:#334155;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.bar{fill:#fbbf24;stroke:#b45309}</style></defs>
  <rect class="bg" width="1120" height="760"/>
  <text x="32" y="38" class="head">Japan municipality rurality, deprivation, and cause-specific mortality</text>
  <text x="32" y="60" class="small">Original technical schematic - explanatory notation may differ from the paper</text>
  <rect x="32" y="86" width="330" height="190" class="panel"/><text x="52" y="116" class="head">A. Municipality outcomes</text><text x="52" y="142" class="sub">4,078,801 deaths, 1,890 municipalities, 2017-2019</text>
  <rect x="78" y="166" width="62" height="62" class="sp"/><rect x="148" y="166" width="62" height="62" class="sp"/><rect x="218" y="166" width="62" height="62" class="sp"/><text x="76" y="252" class="eq">Y[i,c] = deaths by municipality i and cause c</text>
  <rect x="394" y="86" width="330" height="190" class="panel"/><text x="414" y="116" class="head">B. Geographic and social exposure</text><text x="414" y="142" class="sub">Rurality Index for Japan plus Area Deprivation Index</text>
  <rect x="438" y="176" width="104" height="58" class="rural"/><text x="459" y="210" class="small">rurality</text><rect x="576" y="176" width="104" height="58" class="dep"/><text x="597" y="210" class="small">ADI</text><text x="430" y="256" class="eq">covariates: RIJ_i, ADI_i, sex, cause</text>
  <rect x="756" y="86" width="330" height="190" class="panel"/><text x="776" y="116" class="head">C. Spatial Poisson model</text><text x="776" y="142" class="sub">Bayesian areal model estimates adjusted rate ratios</text>
  <text x="788" y="180" class="eq">Y[i,c] ~ Poisson(E[i,c] * theta[i,c])</text><text x="788" y="210" class="eq">log theta = alpha_c + beta_c RIJ_i + gamma_c ADI_i + u_i</text><text x="788" y="240" class="eq">u_i | neighbors ~ spatial prior</text>
  <rect x="32" y="310" width="330" height="190" class="panel"/><text x="52" y="340" class="head">D. Cause-specific RRs</text><text x="52" y="366" class="sub">35 outcomes estimated separately</text>
  <rect x="72" y="426" width="42" height="32" class="bar"/><rect x="124" y="398" width="42" height="60" class="bar"/><rect x="176" y="384" width="42" height="74" class="bar"/><rect x="228" y="416" width="42" height="42" class="bar"/><rect x="280" y="405" width="42" height="53" class="bar"/><text x="63" y="482" class="small">CVD</text><text x="122" y="482" class="small">injury</text><text x="174" y="482" class="small">suicide</text><text x="228" y="482" class="small">TB</text><text x="272" y="482" class="small">cancer</text>
  <rect x="394" y="310" width="330" height="190" class="panel"/><text x="414" y="340" class="head">E. Adjustment contrast</text><text x="414" y="366" class="sub">Attenuation after ADI adjustment interpreted descriptively</text>
  <line x1="445" y1="442" x2="680" y2="442" stroke="#334155"/><circle cx="505" cy="442" r="9" class="rural"/><circle cx="600" cy="442" r="9" class="dep"/><text x="458" y="416" class="small">rurality-only RR</text><text x="570" y="416" class="small">+ deprivation</text><text x="424" y="486" class="eq">attenuation = (RR_base - RR_adjusted) / (RR_base - 1)</text>
  <rect x="756" y="310" width="330" height="190" class="panel"/><text x="776" y="340" class="head">F. Disparity implications</text><text x="776" y="366" class="sub">Different causes point to different access and urban-context risks</text>
  <rect x="792" y="394" width="118" height="66" class="rural"/><text x="809" y="421" class="small">access-</text><text x="802" y="440" class="small">sensitive</text><rect x="942" y="394" width="118" height="66" class="dep"/><text x="958" y="421" class="small">urban</text><text x="951" y="440" class="small">excess</text><text x="790" y="486" class="eq">estimand = RR_c(RIJ | ADI, spatial structure)</text>
  <path d="M362 181 H394" class="line"/><path d="M724 181 H756" class="line"/><path d="M922 276 V310" class="line"/><path d="M756 407 H724" class="line"/><path d="M394 407 H362" class="line"/>
</svg>
