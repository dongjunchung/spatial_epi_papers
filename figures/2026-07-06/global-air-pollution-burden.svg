<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for global ambient air pollution disease burden analysis</title>
  <desc id="desc">Six-panel schematic showing GBD 2021 inputs, PM2.5 and ozone exposure-attributable burden estimation, spatial heterogeneity, SDI association, decomposition, and region-specific policy outputs. This is an original schematic, not a reproduced publication figure.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#374151"/></marker>
  <style>.bg{fill:#f6f7fb}.panel{fill:#ffffff;stroke:#62748a;stroke-width:1.5;rx:8}.head{font:700 18px Arial,sans-serif;fill:#243447}.sub{font:13px Arial,sans-serif;fill:#243447}.small{font:12px Arial,sans-serif;fill:#46576b}.eq{font:13px Consolas,monospace;fill:#243447}.blue{fill:#dbeafe;stroke:#3b82f6}.orange{fill:#ffedd5;stroke:#f97316}.green{fill:#dcfce7;stroke:#16a34a}.red{fill:#fee2e2;stroke:#dc2626}.line{stroke:#374151;stroke-width:1.8;fill:none;marker-end:url(#arrow)}</style></defs>
  <rect class="bg" width="1120" height="760"/>
  <text x="32" y="38" class="head">Global burden attributable to ambient PM2.5 and ozone</text>
  <text x="32" y="60" class="small">Original technical schematic - explanatory notation may differ from GBD implementation</text>
  <rect x="32" y="86" width="330" height="190" class="panel"/><text x="52" y="116" class="head">A. GBD 2021 data frame</text><text x="52" y="142" class="sub">1990-2020, global regions, age-standardized burden</text>
  <rect x="65" y="170" width="72" height="50" class="blue"/><text x="81" y="199" class="small">PM2.5</text><rect x="157" y="170" width="72" height="50" class="orange"/><text x="183" y="199" class="small">O3</text><rect x="249" y="170" width="72" height="50" class="green"/><text x="267" y="199" class="small">SDI</text><text x="64" y="250" class="eq">burden[r,t,a] = deaths, DALYs, rates</text>
  <rect x="394" y="86" width="330" height="190" class="panel"/><text x="414" y="116" class="head">B. Attributable burden</text><text x="414" y="142" class="sub">Exposure-response attribution by pollutant</text>
  <text x="430" y="184" class="eq">AF_p(r,t) = f(exposure_p, counterfactual)</text><text x="430" y="214" class="eq">Y_attr = AF_p * Y_total</text><rect x="454" y="232" width="88" height="24" class="blue"/><text x="468" y="249" class="small">PM2.5</text><rect x="566" y="232" width="88" height="24" class="orange"/><text x="598" y="249" class="small">O3</text>
  <rect x="756" y="86" width="330" height="190" class="panel"/><text x="776" y="116" class="head">C. Spatial heterogeneity</text><text x="776" y="142" class="sub">Regional burden patterns diverge by development level</text>
  <rect x="806" y="169" width="55" height="55" fill="#dbeafe" stroke="#3b82f6"/><rect x="861" y="169" width="55" height="55" fill="#bfdbfe" stroke="#3b82f6"/><rect x="916" y="169" width="55" height="55" fill="#fdba74" stroke="#f97316"/><rect x="971" y="169" width="55" height="55" fill="#fb7185" stroke="#dc2626"/><text x="792" y="252" class="small">High-SDI burden declines; low/middle-SDI burden persists or increases</text>
  <rect x="32" y="310" width="330" height="190" class="panel"/><text x="52" y="340" class="head">D. SDI-burden curve</text><text x="52" y="366" class="sub">Reported reversed U-shaped association</text>
  <path d="M74 458 C122 356,210 356,312 458" fill="none" stroke="#dc2626" stroke-width="3"/><line x1="74" y1="462" x2="316" y2="462" stroke="#243447"/><line x1="74" y1="462" x2="74" y2="372" stroke="#243447"/><text x="178" y="486" class="small">SDI</text><text x="52" y="388" class="small">burden</text>
  <rect x="394" y="310" width="330" height="190" class="panel"/><text x="414" y="340" class="head">E. Decomposition</text><text x="414" y="366" class="sub">Drivers of changing absolute deaths</text>
  <rect x="432" y="425" width="58" height="34" class="red"/><rect x="508" y="405" width="58" height="54" class="red"/><rect x="584" y="390" width="58" height="69" class="red"/><rect x="660" y="428" width="40" height="31" class="green"/><text x="422" y="483" class="small">growth</text><text x="502" y="483" class="small">aging</text><text x="574" y="483" class="small">exposure</text><text x="646" y="483" class="small">baseline</text>
  <rect x="756" y="310" width="330" height="190" class="panel"/><text x="776" y="340" class="head">F. Policy estimands</text><text x="776" y="366" class="sub">Region-specific pollution control and health equity targeting</text>
  <rect x="800" y="394" width="102" height="62" class="blue"/><text x="823" y="421" class="small">rate</text><text x="814" y="440" class="small">declines</text><rect x="930" y="394" width="102" height="62" class="orange"/><text x="951" y="421" class="small">absolute</text><text x="954" y="440" class="small">deaths</text><text x="786" y="486" class="eq">target = high attributable deaths + widening disparities</text>
  <path d="M362 181 H394" class="line"/><path d="M724 181 H756" class="line"/><path d="M922 276 V310" class="line"/><path d="M756 407 H724" class="line"/><path d="M394 407 H362" class="line"/>
</svg>
