<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Zhuhai mobile signaling wastewater population modeling</title>
  <desc id="desc">Six-panel schematic showing mobile signaling population estimates, 12 wastewater catchments, day-night spatial heterogeneity, correlation with wastewater quantity and quality, comparison with hydrochemical proxies, and operational wastewater control outputs.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#334155"/></marker>
    <style>
      .panel{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:6}.head{font:700 18px Arial,sans-serif;fill:#0f172a}.label{font:14px Arial,sans-serif;fill:#1f2937}.small{font:12px Arial,sans-serif;fill:#475569}.eq{font:13px Consolas,monospace;fill:#111827}.link{stroke:#334155;stroke-width:1.6;marker-end:url(#arrow);fill:none}.catch{fill:#dbeafe;stroke:#2563eb}.plant{fill:#dcfce7;stroke:#16a34a}.warn{fill:#fee2e2;stroke:#dc2626}
    </style>
  </defs>
  <rect width="1120" height="760" fill="#fff"/>
  <text x="32" y="34" class="head">Original technical schematic - not a reproduced publication figure</text>
  <text x="32" y="56" class="small">Reported details from PubMed abstract; correlation notation is explanatory and may differ from the paper.</text>
  <rect x="30" y="86" width="330" height="185" class="panel"/>
  <text x="48" y="116" class="head">A. Mobile signaling data</text>
  <text x="52" y="148" class="label">MSD-derived population model</text>
  <text x="52" y="173" class="label">High spatial + temporal resolution</text>
  <circle cx="248" cy="145" r="16" fill="#bfdbfe" stroke="#2563eb"/><circle cx="288" cy="164" r="12" fill="#bfdbfe" stroke="#2563eb"/><circle cx="230" cy="196" r="10" fill="#bfdbfe" stroke="#2563eb"/>
  <path d="M248 145 L288 164 L230 196 L248 145" stroke="#64748b" fill="none"/>
  <text x="52" y="223" class="eq">P_i(t) from phone-location signals</text>
  <rect x="395" y="86" width="330" height="185" class="panel"/>
  <text x="413" y="116" class="head">B. Wastewater spatial support</text>
  <text x="417" y="145" class="label">Zhuhai City: 12 catchments</text>
  <rect x="430" y="164" width="55" height="44" class="catch"/><rect x="495" y="164" width="55" height="44" class="catch"/><rect x="560" y="164" width="55" height="44" class="catch"/><rect x="625" y="164" width="55" height="44" class="catch"/>
  <rect x="430" y="218" width="55" height="28" class="catch"/><rect x="495" y="218" width="55" height="28" class="catch"/><rect x="560" y="218" width="55" height="28" class="catch"/><rect x="625" y="218" width="55" height="28" class="plant"/>
  <text x="643" y="237" class="small">WWTP</text>
  <rect x="760" y="86" width="330" height="185" class="panel"/>
  <text x="778" y="116" class="head">C. Day-night heterogeneity</text>
  <text x="782" y="147" class="label">Some residential catchments:</text>
  <text x="782" y="172" class="label">night population exceeded day</text>
  <text x="782" y="197" class="label">by about 22,000 people</text>
  <rect x="970" y="145" width="28" height="70" fill="#fde68a"/><rect x="1010" y="115" width="28" height="100" fill="#60a5fa"/>
  <text x="964" y="235" class="small">day</text><text x="1000" y="235" class="small">night</text>
  <rect x="30" y="315" width="330" height="185" class="panel"/>
  <text x="48" y="345" class="head">D. Wastewater correlations</text>
  <text x="52" y="377" class="eq">corr(P_i(t), load_i(t))</text>
  <text x="52" y="404" class="label">Organic and nutrient loads</text>
  <text x="52" y="429" class="label">BOD especially in residential/commercial catchments</text>
  <circle cx="265" cy="408" r="42" fill="#dcfce7" stroke="#16a34a"/><text x="246" y="412" class="label">BOD</text>
  <rect x="395" y="315" width="330" height="185" class="panel"/>
  <text x="413" y="345" class="head">E. Proxy comparison</text>
  <text x="420" y="377" class="label">MSD estimates: lower temporal variability</text>
  <text x="440" y="401" class="small">RSD 0.98%-4.91%</text>
  <text x="420" y="433" class="label">Hydrochemical proxies:</text>
  <text x="440" y="457" class="small">higher, catchment-dependent variability</text>
  <rect x="622" y="374" width="60" height="22" class="plant"/><rect x="622" y="424" width="60" height="55" class="warn"/>
  <rect x="760" y="315" width="330" height="185" class="panel"/>
  <text x="778" y="345" class="head">F. Operational outputs</text>
  <text x="782" y="379" class="label">Dynamic population denominator</text>
  <text x="782" y="405" class="label">Wastewater load prediction</text>
  <text x="782" y="431" class="label">Catchment-specific process control</text>
  <text x="782" y="457" class="label">Potential epidemiologic normalization layer</text>
  <path d="M360 178 L395 178" class="link"/><path d="M725 178 L760 178" class="link"/><path d="M925 271 L925 315" class="link"/><path d="M760 407 L725 407" class="link"/><path d="M395 407 L360 407" class="link"/>
</svg>
