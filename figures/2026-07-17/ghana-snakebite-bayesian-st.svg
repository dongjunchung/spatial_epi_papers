<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Ghana snakebite Bayesian spatiotemporal modeling</title>
  <desc id="desc">Six-panel schematic showing monthly district snakebite counts, environmental covariates, Bayesian spatiotemporal INLA model components, hotspot and exceedance outputs, geographic access to treatment, and antivenom allocation estimands.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#334155"/></marker>
    <style>
      .panel{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:6}
      .head{font:700 18px Arial,sans-serif;fill:#0f172a}
      .label{font:14px Arial,sans-serif;fill:#1f2937}
      .small{font:12px Arial,sans-serif;fill:#475569}
      .eq{font:13px Consolas,monospace;fill:#111827}
      .chip{fill:#dbeafe;stroke:#2563eb;stroke-width:1}
      .riskhi{fill:#ef4444}.riskmid{fill:#f59e0b}.risklo{fill:#22c55e}
      .link{stroke:#334155;stroke-width:1.6;marker-end:url(#arrow);fill:none}
    </style>
  </defs>
  <rect width="1120" height="760" fill="#ffffff"/>
  <text x="32" y="34" class="head">Original technical schematic - not a reproduced publication figure</text>
  <text x="32" y="56" class="small">Reported details from the medRxiv abstract; equations are explanatory notation and may differ from the paper.</text>

  <rect x="30" y="86" width="330" height="185" class="panel"/>
  <text x="48" y="116" class="head">A. Surveillance data cube</text>
  <text x="52" y="145" class="label">Y[i,t]: monthly snakebite cases</text>
  <text x="52" y="168" class="label">i = 261 Ghana districts</text>
  <text x="52" y="191" class="label">t = months, 2020-2025</text>
  <rect x="240" y="129" width="28" height="28" class="risklo"/><rect x="272" y="129" width="28" height="28" class="riskmid"/><rect x="304" y="129" width="28" height="28" class="riskhi"/>
  <rect x="240" y="161" width="28" height="28" class="riskmid"/><rect x="272" y="161" width="28" height="28" class="riskhi"/><rect x="304" y="161" width="28" height="28" class="risklo"/>
  <rect x="240" y="193" width="28" height="28" class="riskhi"/><rect x="272" y="193" width="28" height="28" class="riskmid"/><rect x="304" y="193" width="28" height="28" class="risklo"/>
  <text x="52" y="237" class="small">District Health Information Management System</text>

  <rect x="395" y="86" width="330" height="185" class="panel"/>
  <text x="413" y="116" class="head">B. Environmental drivers</text>
  <rect x="420" y="140" width="118" height="34" class="chip"/><text x="434" y="162" class="label">humidity</text>
  <rect x="565" y="140" width="118" height="34" class="chip"/><text x="579" y="162" class="label">temperature</text>
  <rect x="420" y="190" width="118" height="34" fill="#e2e8f0" stroke="#64748b"/><text x="438" y="212" class="label">rainfall</text>
  <rect x="565" y="190" width="118" height="34" fill="#e2e8f0" stroke="#64748b"/><text x="591" y="212" class="label">NDVI</text>
  <text x="414" y="246" class="small">Abstract reports humidity and temperature associated with increased risk.</text>

  <rect x="760" y="86" width="330" height="185" class="panel"/>
  <text x="778" y="116" class="head">C. Bayesian ST model</text>
  <text x="782" y="147" class="eq">Y_it ~ Pois(E_it * theta_it)</text>
  <text x="782" y="172" class="eq">log(theta_it) = alpha + X_it beta</text>
  <text x="782" y="197" class="eq">              + u_i + v_t + gamma_it</text>
  <text x="782" y="224" class="label">spatial effect + temporal random effect</text>
  <text x="782" y="247" class="label">+ space-time interaction; fitted via INLA</text>

  <rect x="30" y="315" width="330" height="185" class="panel"/>
  <text x="48" y="345" class="head">D. Hotspots and exceedance</text>
  <circle cx="93" cy="405" r="32" class="riskhi"/><circle cx="162" cy="405" r="24" class="riskmid"/><circle cx="226" cy="405" r="18" class="risklo"/>
  <text x="52" y="461" class="label">RR surfaces + P(RR &gt; 1)</text>
  <text x="52" y="484" class="small">LISA identifies persistent high-risk districts.</text>
  <text x="215" y="368" class="small">Upper West, Savannah,</text>
  <text x="215" y="386" class="small">North East, Western North,</text>
  <text x="215" y="404" class="small">Bono, Oti, Western, Eastern</text>

  <rect x="395" y="315" width="330" height="185" class="panel"/>
  <text x="413" y="345" class="head">E. Access inequity layer</text>
  <path d="M455 440 C520 360,590 455,665 370" stroke="#64748b" stroke-width="5" fill="none"/>
  <circle cx="455" cy="440" r="10" class="riskhi"/><circle cx="562" cy="405" r="10" class="riskmid"/><rect x="645" y="350" width="40" height="38" fill="#bfdbfe" stroke="#1d4ed8"/>
  <text x="647" y="374" class="small">Tx</text>
  <text x="420" y="390" class="label">high RR districts</text>
  <text x="505" y="462" class="label">travel/access surface</text>
  <text x="420" y="485" class="small">High risk often overlapped poor treatment access.</text>

  <rect x="760" y="315" width="330" height="185" class="panel"/>
  <text x="778" y="345" class="head">F. Policy estimands</text>
  <text x="782" y="378" class="label">Priority district list</text>
  <text x="782" y="403" class="label">Antivenom stock placement</text>
  <text x="782" y="428" class="label">Seasonal preparedness</text>
  <text x="782" y="453" class="label">WHO 2030 burden-reduction support</text>
  <rect x="990" y="365" width="54" height="82" fill="#fee2e2" stroke="#dc2626"/><text x="1000" y="411" class="small">RR</text>

  <path d="M360 178 L395 178" class="link"/><path d="M725 178 L760 178" class="link"/>
  <path d="M925 271 L925 315" class="link"/><path d="M760 407 L725 407" class="link"/><path d="M395 407 L360 407" class="link"/>
</svg>
