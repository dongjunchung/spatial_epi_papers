<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for spatio-temporal healthcare accessibility sensitivity analysis</title>
  <desc id="desc">Six-panel technical schematic showing Florida ZIP-week accessibility inputs, a system dynamics accessibility model, four tiers of global sensitivity analysis, reported spatial heterogeneity in factor importance, spatiotemporal week-by-ZIP outputs, and planning estimands. The schematic is original and not reproduced from the paper.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#344054"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.5;rx:8}.hdr{font:700 18px Arial,sans-serif;fill:#0f172a}.txt{font:14px Arial,sans-serif;fill:#1e293b}.small{font:12px Arial,sans-serif;fill:#475569}.eq{font:15px 'Times New Roman',serif;fill:#0f172a}.note{font:12px Arial,sans-serif;fill:#64748b}.chip1{fill:#dbeafe;stroke:#60a5fa}.chip2{fill:#dcfce7;stroke:#4ade80}.chip3{fill:#fee2e2;stroke:#f87171}.chip4{fill:#fef3c7;stroke:#f59e0b}.arrow{stroke:#344054;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text x="36" y="38" class="hdr">Original technical schematic: spatio-temporal sensitivity of healthcare accessibility</text>
  <text x="36" y="60" class="note">Not a reproduced publication figure. Equations are explanatory notation; notation may differ from Danso and Mao.</text>

  <rect x="36" y="88" width="378" height="188" class="panel"/>
  <text x="56" y="118" class="hdr">A. Indexed spatial inputs</text>
  <text x="56" y="146" class="txt">Florida case study, ZIP codes z and weeks t</text>
  <rect x="62" y="165" width="88" height="70" class="chip1"/><text x="78" y="195" class="small">disease</text><text x="82" y="212" class="small">rate</text>
  <rect x="165" y="165" width="88" height="70" class="chip2"/><text x="180" y="190" class="small">travel</text><text x="176" y="207" class="small">propensity</text>
  <rect x="268" y="165" width="88" height="70" class="chip3"/><text x="285" y="190" class="small">facility</text><text x="282" y="207" class="small">discharge</text>
  <text x="56" y="255" class="eq">x(z,t) = {disease, travel, service, demand}</text>

  <rect x="451" y="88" width="378" height="188" class="panel"/>
  <text x="471" y="118" class="hdr">B. System dynamics model</text>
  <text x="471" y="146" class="txt">Accessibility response by place and week</text>
  <rect x="494" y="171" width="115" height="54" class="chip2"/><text x="514" y="203" class="small">population</text>
  <rect x="672" y="171" width="115" height="54" class="chip1"/><text x="696" y="195" class="small">care</text><text x="690" y="212" class="small">capacity</text>
  <path d="M609 198 C628 176,652 176,672 198" class="arrow"/>
  <path d="M672 215 C650 238,628 238,609 215" class="arrow"/>
  <text x="487" y="252" class="eq">Azt = f(xzt, feedbacks, delays)</text>

  <rect x="866" y="88" width="378" height="188" class="panel"/>
  <text x="886" y="118" class="hdr">C. Four-tier GSA protocol</text>
  <text x="886" y="148" class="txt">Reported tiers:</text>
  <text x="908" y="174" class="small">1. general</text>
  <text x="908" y="195" class="small">2. spatial</text>
  <text x="908" y="216" class="small">3. temporal</text>
  <text x="908" y="237" class="small">4. spatio-temporal</text>
  <text x="1055" y="193" class="eq">Si, STi</text>
  <text x="1010" y="226" class="small">global sensitivity indices</text>

  <rect x="36" y="314" width="378" height="190" class="panel"/>
  <text x="56" y="344" class="hdr">D. Reported spatial heterogeneity</text>
  <rect x="68" y="377" width="120" height="82" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="93" y="416" class="txt">rural ZIPs</text>
  <text x="71" y="444" class="small">travel propensity stronger</text>
  <rect x="230" y="377" width="120" height="82" fill="#fef2f2" stroke="#ef4444"/>
  <text x="254" y="416" class="txt">urban ZIPs</text>
  <text x="238" y="444" class="small">discharge rate stronger</text>
  <text x="56" y="484" class="small">Disease rate had the greatest overall influence.</text>

  <rect x="451" y="314" width="378" height="190" class="panel"/>
  <text x="471" y="344" class="hdr">E. Spatio-temporal output</text>
  <text x="471" y="370" class="txt">Factor importance varies by week and ZIP</text>
  <g transform="translate(500,395)">
    <rect width="240" height="72" fill="#f8fafc" stroke="#94a3b8"/>
    <g fill="#bfdbfe"><rect x="2" y="2" width="38" height="16"/><rect x="42" y="20" width="38" height="16"/><rect x="82" y="38" width="38" height="16"/></g>
    <g fill="#fecaca"><rect x="42" y="2" width="38" height="16"/><rect x="162" y="20" width="38" height="16"/><rect x="202" y="38" width="36" height="16"/></g>
    <g fill="#bbf7d0"><rect x="122" y="2" width="38" height="16"/><rect x="82" y="20" width="38" height="16"/><rect x="122" y="56" width="38" height="14"/></g>
    <g fill="#fde68a"><rect x="202" y="2" width="36" height="16"/><rect x="2" y="56" width="38" height="14"/><rect x="162" y="56" width="38" height="14"/></g>
  </g>
  <text x="512" y="486" class="small">columns: weeks t; rows: ZIP groups z; color: dominant driver</text>

  <rect x="866" y="314" width="378" height="190" class="panel"/>
  <text x="886" y="344" class="hdr">F. Planning estimands</text>
  <text x="886" y="374" class="txt">Local vs statewide and short- vs long-term</text>
  <path d="M905 410 H1195" class="arrow"/>
  <text x="915" y="401" class="small">posterior/sensitivity summaries</text>
  <rect x="918" y="429" width="112" height="42" class="chip1"/><text x="945" y="455" class="small">where</text>
  <rect x="1050" y="429" width="112" height="42" class="chip4"/><text x="1077" y="455" class="small">when</text>
  <text x="887" y="490" class="small">Target interventions to the dominant driver by scale.</text>

  <path d="M414 182 H451" class="arrow"/><path d="M829 182 H866" class="arrow"/>
  <path d="M225 276 V314" class="arrow"/><path d="M640 276 V314" class="arrow"/><path d="M1055 276 V314" class="arrow"/>
</svg>
