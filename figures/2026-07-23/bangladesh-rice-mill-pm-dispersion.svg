<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Bangladesh rice-mill particulate spatial exposure and dispersion modeling</title>
  <desc id="desc">Five-panel schematic showing 69 optical particle counter sampling points around rice processing mill hubs in Khajanagar, Kushtia, industrial and residential zones, PM2.5 and PM10 spatial mapping, Gaussian plume dispersion with meteorology, nonparametric interzone testing and correlation checks, AirQ+ health risk assessment, and hotspot-oriented emission control outputs. The notation is explanatory and may differ from the paper.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:8}.head{font:700 22px Arial,sans-serif;fill:#0f172a}.sub{font:700 15px Arial,sans-serif;fill:#1e293b}.txt{font:14px Arial,sans-serif;fill:#334155}.tiny{font:12px Arial,sans-serif;fill:#475569}.eq{font:15px Consolas,monospace;fill:#0f172a}.line{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;fill:none}.hot{fill:#fb7185}.med{fill:#fbbf24}.low{fill:#86efac}.zone{fill:#f1f5f9;stroke:#94a3b8}.blue{fill:#e0f2fe;stroke:#0284c7}
    </style>
  </defs>
  <rect class="bg" width="1280" height="860"/>
  <text x="640" y="42" text-anchor="middle" class="head">Rice-mill PM exposure: spatial monitoring, plume dispersion, health risk</text>
  <text x="640" y="68" text-anchor="middle" class="tiny">Original technical schematic, not a reproduced publication figure</text>

  <rect class="panel" x="34" y="96" width="370" height="260"/>
  <text x="58" y="128" class="sub">A. Monitoring design</text>
  <text x="58" y="154" class="txt">Khajanagar, Kushtia rice processing hub</text>
  <text x="58" y="176" class="txt">69 optical particle counter sampling points</text>
  <g transform="translate(64 204)">
    <rect x="0" y="0" width="130" height="94" class="zone"/><text x="14" y="24" class="txt">Industrial</text><text x="14" y="46" class="tiny">0-100 m</text>
    <rect x="168" y="0" width="130" height="94" class="zone"/><text x="184" y="24" class="txt">Residential</text><text x="184" y="46" class="tiny">101-300 m</text>
    <circle cx="46" cy="70" r="6" class="hot"/><circle cx="72" cy="64" r="6" class="hot"/><circle cx="104" cy="75" r="6" class="med"/>
    <circle cx="204" cy="70" r="6" class="med"/><circle cx="236" cy="62" r="6" class="hot"/><circle cx="268" cy="74" r="6" class="low"/>
  </g>

  <rect class="panel" x="455" y="96" width="370" height="260"/>
  <text x="479" y="128" class="sub">B. Spatial mapping and tests</text>
  <text x="479" y="164" class="eq">PM_s in {PM2.5_s, PM10_s}</text>
  <text x="479" y="192" class="eq">H0: zone distributions equal</text>
  <text x="479" y="220" class="txt">Reported: Kruskal-Wallis p &lt; 0.05</text>
  <text x="479" y="246" class="txt">Hotspots: western/eastern industrial belts</text>
  <text x="479" y="270" class="txt">and western residential cluster</text>
  <text x="479" y="304" class="tiny">PM2.5 and PM10 strongly correlated; weak with humidity/temperature.</text>

  <rect class="panel" x="876" y="96" width="370" height="260"/>
  <text x="900" y="128" class="sub">C. Gaussian plume component</text>
  <text x="900" y="162" class="eq">C(x,y,z) = Q / (2*pi*u*sigma_y*sigma_z)</text>
  <text x="900" y="190" class="eq">           * exp(-y^2/(2*sigma_y^2)) * V(z,H)</text>
  <text x="900" y="224" class="tiny">Generic plume notation; exact paper equation may differ.</text>
  <g transform="translate(916 256)">
    <rect x="0" y="46" width="46" height="46" fill="#94a3b8"/><text x="4" y="118" class="tiny">mill</text>
    <path class="dash" d="M52 66 C112 18,190 18,300 66"/>
    <path class="dash" d="M52 78 C130 96,214 118,300 90"/>
    <path class="line" d="M120 20 L258 20"/><text x="146" y="16" class="tiny">wind</text>
  </g>

  <rect class="panel" x="118" y="410" width="500" height="330"/>
  <text x="142" y="442" class="sub">D. Health-risk model</text>
  <text x="142" y="478" class="eq">DeltaMort = y0 * Pop * (RR(C) - 1) / RR(C)</text>
  <text x="142" y="506" class="tiny">Generic attributable-burden notation for AirQ+ style risk assessment.</text>
  <g transform="translate(150 540)">
    <rect x="0" y="0" width="420" height="40" class="blue"/><text x="14" y="26" class="txt">Children under 5: PM2.5-linked ALRI mortality 39.78%</text>
    <rect x="0" y="56" width="420" height="40" class="blue"/><text x="14" y="82" class="txt">Adults 30+: COPD 48.01%, IHD 56.25%, stroke 65.05%</text>
    <rect x="0" y="112" width="420" height="40" class="blue"/><text x="14" y="138" class="txt">PM10 adds IHD and lung-cancer risk; PM2.5 lung cancer 34.16%</text>
  </g>

  <rect class="panel" x="675" y="410" width="500" height="330"/>
  <text x="699" y="442" class="sub">E. Policy estimands</text>
  <g transform="translate(716 478)">
    <rect x="0" y="0" width="116" height="78" class="hot" opacity="0.85"/><text x="18" y="34" class="txt">Hotspot</text><text x="18" y="56" class="tiny">micro-area</text>
    <path class="line" d="M130 39 L202 39"/>
    <rect x="210" y="0" width="214" height="78" fill="#fee2e2" stroke="#dc2626"/><text x="230" y="32" class="txt">Prioritize emission controls</text><text x="230" y="54" class="txt">near homes and downwind belts</text>
    <path class="line" d="M317 86 L317 140"/>
    <rect x="88" y="148" width="336" height="78" fill="#dcfce7" stroke="#16a34a"/><text x="110" y="178" class="txt">Estimate avoidable mortality under</text><text x="110" y="200" class="txt">lower PM exposure scenarios</text>
  </g>

  <path class="line" d="M404 226 L455 226"/><path class="line" d="M825 226 L876 226"/>
  <path class="line" d="M1060 356 L1060 388 L368 388 L368 410"/>
</svg>
