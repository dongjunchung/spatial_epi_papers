<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for China pulmonary tuberculosis spatial forecasting</title>
  <desc id="desc">Six-panel schematic showing monthly pulmonary tuberculosis incidence and mortality data, joinpoint trends, global and local Moran clustering, rolling-window model comparison, XGBoost forecasts, and regional intervention estimands. This is an original schematic, not a reproduced publication figure.</desc>
  <style>.bg{fill:#f7fbfc}.panel{fill:#fff;stroke:#203842;stroke-width:1.4;rx:8}.head{font:700 18px Arial;fill:#18313b}.label{font:14px Arial;fill:#243e49}.small{font:12px Arial;fill:#516873}.eq{font:15px "Times New Roman";fill:#18313b}.arrow{stroke:#5b737d;stroke-width:2.2;marker-end:url(#arrow)}.hot{fill:#d66652}.cold{fill:#78a6bc}.model{fill:#4b7f9f}.good{fill:#6a994e}.axis{stroke:#667983;stroke-width:1}</style>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5b737d"/></marker></defs>
  <rect class="bg" width="1200" height="820"/>
  <text x="34" y="36" class="head">China pulmonary tuberculosis: original spatial trend and forecasting schematic</text>
  <text x="34" y="60" class="small">Reported details: monthly PTB incidence and mortality, 2004-2025; forecasts to 2030; notation is explanatory.</text>
  <rect class="panel" x="30" y="90" width="360" height="200"/><text x="50" y="122" class="head">A. National surveillance series</text>
  <text x="58" y="160" class="eq">r<tspan baseline-shift="sub">p,t</tspan> = cases<tspan baseline-shift="sub">p,t</tspan> / population<tspan baseline-shift="sub">p,t</tspan></text>
  <polyline points="70,245 110,212 150,205 190,215 230,230 270,238 320,246" fill="none" stroke="#4b7f9f" stroke-width="4"/>
  <line x1="65" y1="255" x2="330" y2="255" class="axis"/><line x1="65" y1="255" x2="65" y2="185" class="axis"/>
  <text x="58" y="278" class="small">Incidence and mortality series by province and month.</text>
  <rect class="panel" x="420" y="90" width="360" height="200"/><text x="440" y="122" class="head">B. Trend decomposition</text>
  <text x="448" y="160" class="label">Joinpoint regression: annual percent changes</text>
  <polyline points="455,245 505,210 555,225 605,235 655,248 715,258" fill="none" stroke="#d66652" stroke-width="4"/>
  <circle cx="505" cy="210" r="6" class="hot"/><circle cx="555" cy="225" r="6" class="hot"/>
  <text x="448" y="278" class="small">Reported incidence decline after 2006; mortality also decreased.</text>
  <rect class="panel" x="810" y="90" width="360" height="200"/><text x="830" y="122" class="head">C. Spatial clustering</text>
  <text x="838" y="158" class="eq">Global/local Moran's I over provinces</text>
  <rect x="865" y="188" width="70" height="45" class="cold"/><rect x="945" y="170" width="70" height="63" class="hot"/><rect x="1025" y="152" width="70" height="81" class="hot"/><rect x="1105" y="205" width="35" height="28" class="cold"/>
  <text x="838" y="266" class="small">Hotspots shifted from southern China to western provinces including Tibet and Xinjiang.</text>
  <rect class="panel" x="30" y="330" width="360" height="200"/><text x="50" y="362" class="head">D. Rolling forecast comparison</text>
  <text x="58" y="400" class="label">Train: 2004-2021; test: 2022-2025</text>
  <rect x="70" y="430" width="95" height="24" fill="#d6d6d6"/><text x="175" y="448" class="small">Holt-Winters</text>
  <rect x="70" y="464" width="125" height="24" fill="#d6d6d6"/><text x="205" y="482" class="small">SARIMA</text>
  <rect x="70" y="498" width="108" height="24" fill="#d6d6d6"/><text x="188" y="516" class="small">Prophet</text>
  <rect x="210" y="430" width="150" height="24" class="good"/><text x="218" y="448" class="small">XGBoost lowest errors</text>
  <rect class="panel" x="420" y="330" width="360" height="200"/><text x="440" y="362" class="head">E. Forecast outputs</text>
  <polyline points="460,455 500,440 540,425 580,418 620,416 660,418 720,420" fill="none" stroke="#4b7f9f" stroke-width="4"/>
  <polyline points="620,416 660,418 720,420" fill="none" stroke="#6a994e" stroke-width="5" stroke-dasharray="8 5"/>
  <text x="450" y="395" class="label">XGBoost projects incidence plateau</text>
  <text x="450" y="500" class="small">Approx. 3.5-4.2 per 100,000 through 2030; mortality stays low.</text>
  <rect class="panel" x="810" y="330" width="360" height="200"/><text x="830" y="362" class="head">F. Intervention signals</text>
  <text x="840" y="400" class="label">Western high-burden hotspots</text>
  <text x="840" y="430" class="small">Sustain geographically tailored case finding and treatment support.</text>
  <text x="840" y="482" class="label">Liaoning anomaly</text>
  <text x="840" y="506" class="small">Rising mortality despite cold-spot incidence needs investigation.</text>
  <path class="arrow" d="M390 190 H420"/><path class="arrow" d="M780 190 H810"/><path class="arrow" d="M210 290 V330"/><path class="arrow" d="M600 290 V330"/><path class="arrow" d="M780 430 H810"/>
</svg>
