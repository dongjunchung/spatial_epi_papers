<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for DPM-QMRA reclaimed-water spray aerosol infection risk</title>
  <desc id="desc">Six-panel schematic showing multi-nozzle reclaimed-water sprays, discrete phase model aerosol transport, inhalation exposure, quantitative microbial risk assessment, sensitivity analysis, and safe contact distance outputs. This is an original schematic, not a reproduced publication figure.</desc>
  <style>.bg{fill:#f6fafb}.panel{fill:#fff;stroke:#203842;stroke-width:1.4;rx:8}.head{font:700 18px Arial;fill:#17313a}.label{font:14px Arial;fill:#243e49}.small{font:12px Arial;fill:#526a74}.eq{font:15px "Times New Roman";fill:#17313a}.arrow{stroke:#5b737d;stroke-width:2.2;marker-end:url(#arrow)}.water{fill:#4fa3c5}.risk{fill:#d8664f}.safe{fill:#69a86f}.mid{fill:#e8b04c}.axis{stroke:#667983;stroke-width:1}</style>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#5b737d"/></marker></defs>
  <rect class="bg" width="1200" height="820"/>
  <text x="34" y="36" class="head">Reclaimed-water aerosol infection risk: original DPM-QMRA technical schematic</text>
  <text x="34" y="60" class="small">Reported details: multi-nozzle sprays, Pseudomonas aeruginosa, Coxsackievirus, wind scenarios; exact QMRA parameters not exposed in abstract.</text>
  <rect class="panel" x="30" y="90" width="360" height="200"/><text x="50" y="122" class="head">A. Spray scenario</text>
  <rect x="70" y="235" width="260" height="18" fill="#6c7a86"/><circle cx="105" cy="235" r="10" class="water"/><circle cx="165" cy="235" r="10" class="water"/><circle cx="225" cy="235" r="10" class="water"/><circle cx="285" cy="235" r="10" class="water"/>
  <path d="M105 225 C95 190 78 170 55 150" fill="none" stroke="#4fa3c5" stroke-width="3"/><path d="M165 225 C158 178 145 158 120 138" fill="none" stroke="#4fa3c5" stroke-width="3"/><path d="M225 225 C232 178 245 158 270 138" fill="none" stroke="#4fa3c5" stroke-width="3"/><path d="M285 225 C305 190 325 170 348 150" fill="none" stroke="#4fa3c5" stroke-width="3"/>
  <text x="58" y="275" class="small">Applications include fountains, urban greening, irrigation, road cleaning.</text>
  <rect class="panel" x="420" y="90" width="360" height="200"/><text x="440" y="122" class="head">B. Discrete phase transport</text>
  <text x="448" y="158" class="eq">m d v / dt = drag + gravity + wind</text>
  <circle cx="505" cy="215" r="5" class="water"/><circle cx="550" cy="205" r="5" class="water"/><circle cx="600" cy="220" r="5" class="water"/><circle cx="650" cy="188" r="5" class="water"/><circle cx="705" cy="205" r="5" class="water"/>
  <path class="arrow" d="M475 240 C540 215 605 220 735 185"/>
  <text x="448" y="276" class="small">CFD-DPM estimates wind-dependent aerosol concentration C(x,t).</text>
  <rect class="panel" x="810" y="90" width="360" height="200"/><text x="830" y="122" class="head">C. Exposure calculation</text>
  <text x="838" y="160" class="eq">dose(x) = ∫ C(x,t) · IR · f<tspan baseline-shift="sub">dep</tspan> dt</text>
  <circle cx="930" cy="228" r="20" fill="#f2d6c8"/><rect x="920" y="250" width="20" height="45" fill="#b28f7a"/><path d="M905 252 L865 278" stroke="#b28f7a" stroke-width="5"/><path d="M945 252 L985 278" stroke="#b28f7a" stroke-width="5"/>
  <text x="1005" y="230" class="small">receptor at distance x</text>
  <rect class="panel" x="30" y="330" width="360" height="200"/><text x="50" y="362" class="head">D. QMRA infection risk</text>
  <text x="58" y="400" class="eq">P<tspan baseline-shift="sub">inf</tspan> = 1 - exp(-k · dose)</text>
  <text x="58" y="430" class="label">Indicators: P. aeruginosa and Coxsackievirus</text>
  <polyline points="70,485 110,435 150,405 205,390 260,382 330,378" fill="none" stroke="#d8664f" stroke-width="4"/>
  <line x1="70" y1="490" x2="335" y2="490" class="axis"/><line x1="70" y1="490" x2="70" y2="375" class="axis"/>
  <text x="58" y="515" class="small">Risk declines sharply within 10 m but wind extends downwind range.</text>
  <rect class="panel" x="420" y="330" width="360" height="200"/><text x="440" y="362" class="head">E. Sensitivity analysis</text>
  <rect x="460" y="400" width="245" height="26" class="risk"/><text x="460" y="392" class="small">pathogen concentration</text>
  <rect x="460" y="450" width="145" height="26" class="mid"/><text x="460" y="442" class="small">exposure frequency</text>
  <rect x="460" y="500" width="120" height="26" class="safe"/><text x="460" y="492" class="small">exposure duration</text>
  <rect class="panel" x="810" y="330" width="360" height="200"/><text x="830" y="362" class="head">F. Safe contact distances</text>
  <line x1="860" y1="455" x2="1120" y2="455" class="axis"/><rect x="900" y="425" width="70" height="60" class="safe"/><rect x="970" y="425" width="88" height="60" class="mid"/><rect x="1058" y="425" width="62" height="60" class="risk"/>
  <text x="895" y="410" class="small">upwind &gt;8 m</text><text x="994" y="410" class="small">source</text><text x="1050" y="410" class="small">downwind &gt;10 m</text>
  <text x="840" y="505" class="small">Benchmark: U.S. EPA annual infection risk threshold 10^-4.</text>
  <path class="arrow" d="M390 190 H420"/><path class="arrow" d="M780 190 H810"/><path class="arrow" d="M210 290 V330"/><path class="arrow" d="M600 290 V330"/><path class="arrow" d="M780 430 H810"/>
</svg>
