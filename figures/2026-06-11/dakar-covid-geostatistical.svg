<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Bayesian spatiotemporal geostatistical model of neighborhood COVID-19 risk in Dakar</title>
  <desc id="desc">Neighborhood infection observations and contextual covariates enter a Bayesian regression with spatiotemporally autocorrelated latent effects, producing posterior covariate estimates, uncertainty, and predictive risk maps for June 2020 through June 2021.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#475569"/></marker>
  <style>.h{font:700 30px Arial;fill:#172554}.sh{font:700 20px Arial;fill:#1e293b}.tx{font:16px Arial;fill:#334155}.sm{font:14px Arial;fill:#475569}.eq{font:15px 'Courier New';fill:#312e81}.b{stroke-width:2.5}.ar{fill:none;stroke:#475569;stroke-width:3;marker-end:url(#a)}</style></defs>
  <rect width="1600" height="980" fill="#f8fafc"/><text x="800" y="48" text-anchor="middle" class="h">Bayesian neighborhood-level COVID-19 risk in Dakar</text>
  <rect x="30" y="82" width="410" height="350" rx="18" fill="#eff6ff" stroke="#2563eb" class="b"/>
  <text x="235" y="118" text-anchor="middle" class="sh">1. Small-area longitudinal data</text>
  <text x="60" y="165" class="eq">Y[i,t] = infections in neighborhood i, month t</text><text x="60" y="202" class="tx">Study period: June 2020 - June 2021</text>
  <g transform="translate(90 250)" stroke="#fff" stroke-width="4"><path d="M0 0h75l22 45-22 50H0L-12 43z" fill="#bfdbfe"/><path d="M82 -5h78l24 48-25 52H70l27-50z" fill="#60a5fa"/><path d="M8 100h75l20 52-28 47H-7l7-55z" fill="#dbeafe"/><path d="M92 98h78l19 54-25 48H75l28-49z" fill="#93c5fd"/></g>
  <text x="300" y="280" class="tx">Neighborhood geometry</text><text x="300" y="315" class="tx">Population denominator</text><text x="300" y="350" class="tx">Repeated infection counts</text>
  <path d="M440 255h50" class="ar"/>
  <rect x="490" y="82" width="400" height="350" rx="18" fill="#fefce8" stroke="#ca8a04" class="b"/>
  <text x="690" y="118" text-anchor="middle" class="sh">2. Contextual risk factors</text>
  <text x="525" y="165" class="eq">X[i] = {density, residential land, ...}</text>
  <rect x="535" y="210" width="310" height="62" rx="10" fill="#fef3c7"/><text x="690" y="248" text-anchor="middle" class="tx">Adjusted population density</text>
  <rect x="535" y="292" width="310" height="62" rx="10" fill="#ffedd5"/><text x="690" y="330" text-anchor="middle" class="tx">Residential-area indicator</text>
  <text x="525" y="395" class="sm">Covariates enter the posterior mean-risk model</text>
  <path d="M890 255h50" class="ar"/>
  <rect x="940" y="82" width="630" height="350" rx="18" fill="#eef2ff" stroke="#4f46e5" class="b"/>
  <text x="1255" y="118" text-anchor="middle" class="sh">3. Bayesian spatiotemporal regression</text>
  <text x="975" y="165" class="eq">Y[i,t] ~ count distribution(mu[i,t])</text><text x="975" y="202" class="eq">g(mu[i,t]) = offset[i,t] + alpha + X[i] beta</text>
  <text x="975" y="237" class="eq">             + omega[i,t]</text>
  <text x="975" y="278" class="eq">Cov(omega[i,t],omega[j,u])</text><text x="975" y="312" class="eq"> = sigma^2 Cspace(d[i,j]) Ctime(|t-u|)</text>
  <text x="975" y="354" class="tx">Priors on regression and covariance parameters</text><text x="975" y="392" class="sm">Residual dependence is modeled across both space and time</text>
  <path d="M800 432v50" class="ar"/>
  <rect x="70" y="485" width="700" height="270" rx="18" fill="#faf5ff" stroke="#7c3aed" class="b"/>
  <text x="420" y="522" text-anchor="middle" class="sh">4. Posterior inference</text>
  <text x="105" y="570" class="eq">p(beta, omega, theta | Y) proportional to</text><text x="105" y="602" class="eq">likelihood x priors x spatial-temporal covariance</text>
  <rect x="110" y="640" width="610" height="75" rx="12" fill="#ede9fe"/><text x="415" y="670" text-anchor="middle" class="tx">Posterior means, credible intervals, predictions</text><text x="415" y="699" text-anchor="middle" class="sm">Integrates observed signal and correlated neighbors</text>
  <rect x="830" y="485" width="700" height="270" rx="18" fill="#fff7ed" stroke="#ea580c" class="b"/>
  <text x="1180" y="522" text-anchor="middle" class="sh">5. Reported covariate estimates</text>
  <text x="870" y="575" class="tx">Adjusted population density</text><text x="870" y="610" class="eq">posterior mean 0.29; 95% CrI 0.24 to 0.34</text>
  <text x="870" y="660" class="tx">Residential areas</text><text x="870" y="695" class="eq">posterior mean 1.25; 95% CrI 0.66 to 1.83</text>
  <text x="870" y="730" class="sm">Strong spatial heterogeneity; relatively small temporal variation</text>
  <path d="M800 755v45" class="ar"/>
  <rect x="120" y="803" width="1360" height="125" rx="18" fill="#f0fdf4" stroke="#16a34a" class="b"/>
  <text x="800" y="840" text-anchor="middle" class="sh">6. Posterior risk surface and targeting</text>
  <text x="170" y="882" class="tx">Higher predicted risk in western Dakar</text><text x="620" y="882" class="tx">Lower risk in eastern/peripheral neighborhoods</text><text x="1110" y="882" class="tx">Map uncertainty with predicted risk</text>
  <text x="800" y="958" text-anchor="middle" class="sm">Original technical schematic; reported estimates separated from explanatory model notation; not a paper figure</text>
</svg>
