<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for western Greater Mekong P. vivax SNP barcode study</title>
  <desc id="desc">Original schematic showing clinical sampling across border areas, SNP genotyping and validation, complexity-of-infection estimation, population differentiation metrics, PCA/phylogeny/ADMIXTURE structure, and elimination outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: 22-SNP barcode for P. vivax spatiotemporal differentiation</text>
  <text x="32" y="56" class="s">Reported: 210 clinical samples, border-area time points, 36 candidate SNPs, 22 validated SNPs, COI, F_ST, PCA, phylogeny and ADMIXTURE.</text>
  <rect x="34" y="92" width="310" height="245" class="p"/><text x="56" y="122" class="h">A. Sampling frame</text><rect x="74" y="154" width="230" height="124" fill="#eef2ff" stroke="#475569"/><circle cx="136" cy="212" r="12" fill="#dbeafe" stroke="#2563eb"/><text x="156" y="216" class="xs">CMB</text><circle cx="186" cy="244" r="12" fill="#dcfce7" stroke="#16a34a"/><text x="206" y="248" class="xs">TMB</text><circle cx="124" cy="255" r="12" fill="#fef3c7" stroke="#d97706"/><text x="144" y="274" class="xs">BMB</text><text x="78" y="308" class="s">four time points; 210 samples</text>
  <rect x="396" y="92" width="304" height="245" class="p"/><text x="418" y="122" class="h">B. Barcode construction</text><rect x="434" y="156" width="220" height="48" class="b"/><text x="458" y="185" class="s">36 SNP MassARRAY panel</text><rect x="434" y="232" width="220" height="48" class="b" fill="#dcfce7"/><text x="458" y="261" class="s">22 validated SNPs</text><path d="M544 204 L544 232" class="arr"/><text x="454" y="310" class="xs">Sanger validation for low-efficiency loci</text>
  <rect x="752" y="92" width="334" height="245" class="p"/><text x="774" y="122" class="h">C. Diversity metrics</text><rect x="788" y="154" width="258" height="124" class="b"/><text x="812" y="180" class="s">COI via ML in COIL</text><text x="812" y="204" class="s">diversity: pi, H_e in GenAIEx</text><text x="812" y="228" class="s">AMOVA, Mantel, pairwise F_ST</text><text x="812" y="252" class="xs">reported: 37.9% polyclonal; F_ST 0.165-0.417</text>
  <path d="M344 216 L396 216" class="arr"/><path d="M700 216 L752 216" class="arr"/>
  <rect x="76" y="404" width="438" height="230" class="p"/><text x="98" y="434" class="h">D. Structure resolution</text><line x1="132" y1="580" x2="300" y2="580" class="ax"/><line x1="132" y1="580" x2="132" y2="472" class="ax"/><circle cx="166" cy="532" r="6" fill="#2563eb"/><circle cx="180" cy="518" r="6" fill="#2563eb"/><circle cx="194" cy="542" r="6" fill="#2563eb"/><circle cx="240" cy="512" r="6" fill="#16a34a"/><circle cx="256" cy="496" r="6" fill="#16a34a"/><circle cx="270" cy="524" r="6" fill="#16a34a"/><circle cx="208" cy="562" r="6" fill="#d97706"/><circle cx="224" cy="550" r="6" fill="#d97706"/><text x="146" y="606" class="xs">PCA / phylogeny / ADMIXTURE</text><rect x="338" y="490" width="130" height="74" class="b"/><rect x="352" y="510" width="25" height="34" fill="#2563eb"/><rect x="377" y="510" width="25" height="34" fill="#16a34a"/><rect x="402" y="510" width="25" height="34" fill="#d97706"/><text x="352" y="584" class="xs">3 genetic clusters</text>
  <rect x="594" y="404" width="458" height="230" class="p"/><text x="616" y="434" class="h">E. Elimination interpretation</text><rect x="632" y="476" width="374" height="52" class="b" fill="#dbeafe"/><text x="656" y="508" class="s">Reduced recent diversity suggests fragmented foci</text><rect x="632" y="552" width="374" height="52" class="b" fill="#dcfce7"/><text x="656" y="584" class="s">Border-specific clusters support targeted surveillance</text>
  <text x="32" y="694" class="xs">Original schematic, not a reproduced publication figure.</text>
</svg>
