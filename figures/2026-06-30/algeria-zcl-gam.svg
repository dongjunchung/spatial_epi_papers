<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Algerian ZCL generalized additive model analysis</title>
  <desc id="desc">Original schematic of ZCL surveillance units, climate lag covariates, generalized additive model terms, nonlinear drought response, and early-warning outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: Algerian steppe ZCL climate-associated GAM</text>
  <text x="32" y="56" class="s">Reported: 2010-2022 cases in Djelfa, Laghouat and Tiaret; climate covariates; GAMs for spatiotemporal and lagged climate associations.</text>
  <rect x="36" y="92" width="300" height="245" class="p"/><text x="58" y="122" class="h">A. Surveillance units</text><rect x="74" y="152" width="220" height="130" fill="#fff7ed" stroke="#9a3412"/><path d="M112 256 L152 200 L196 214 L238 166 L264 260 Z" fill="#fed7aa" stroke="#c2410c"/><circle cx="226" cy="184" r="10" fill="#dc2626"/><text x="242" y="188" class="xs">Laghouat</text><circle cx="154" cy="220" r="7" fill="#f97316"/><text x="170" y="224" class="xs">Djelfa</text><circle cx="120" cy="250" r="5" fill="#f59e0b"/><text x="136" y="254" class="xs">Tiaret</text><text x="76" y="314" class="xs">counts y_it, offset N_it; 8,488 cases reported</text>
  <rect x="390" y="92" width="306" height="245" class="p"/><text x="412" y="122" class="h">B. Climate and season</text><rect x="428" y="158" width="220" height="42" class="b" fill="#ccfbf1"/><text x="448" y="184" class="s">PDSI at 2-month lag</text><rect x="428" y="218" width="220" height="42" class="b"/><text x="448" y="244" class="s">precipitation</text><rect x="428" y="278" width="220" height="42" class="b" fill="#fef3c7"/><text x="448" y="304" class="s">seasonal peaks: Nov-Feb</text>
  <rect x="754" y="92" width="334" height="245" class="p"/><text x="776" y="122" class="h">C. GAM likelihood</text><rect x="790" y="158" width="260" height="122" class="b"/><text x="812" y="184" class="s">log E[y_it] = log N_it + alpha</text><text x="812" y="208" class="s">+ s(space_i) + s(time_t)</text><text x="812" y="232" class="s">+ s(PDSI_{t-2}) + s(precip_t)</text><text x="812" y="256" class="xs">generic notation; exact basis may differ</text>
  <path d="M336 216 L390 216" class="arr"/><path d="M696 216 L754 216" class="arr"/>
  <rect x="82" y="404" width="460" height="230" class="p"/><text x="104" y="434" class="h">D. Nonlinear climate-response estimand</text><line x1="132" y1="586" x2="460" y2="586" class="ax"/><line x1="132" y1="586" x2="132" y2="462" class="ax"/><path d="M142 548 C184 490 226 502 272 556 S354 566 398 504 S438 480 462 510" stroke="#be123c" stroke-width="3" fill="none"/><text x="190" y="612" class="xs">PDSI lag: extreme dry and wet conditions</text><text x="82" y="528" class="xs" transform="rotate(-90 82 528)">relative ZCL risk</text>
  <rect x="602" y="404" width="442" height="230" class="p"/><text x="624" y="434" class="h">E. Early-warning outputs</text><rect x="640" y="480" width="160" height="54" class="b" fill="#ffe4e6"/><text x="664" y="504" class="s">high-risk maps</text><text x="664" y="522" class="xs">Laghouat, northward change</text><rect x="840" y="480" width="160" height="54" class="b" fill="#fef3c7"/><text x="864" y="504" class="s">climate signal</text><text x="864" y="522" class="xs">lagged drought/wetness</text><rect x="742" y="560" width="160" height="54" class="b" fill="#ccfbf1"/><text x="766" y="584" class="s">targeted control</text><text x="766" y="602" class="xs">vector/reservoir settings</text>
  <text x="32" y="694" class="xs">Original schematic, not a reproduced publication figure.</text>
</svg>
