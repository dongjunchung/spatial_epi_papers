<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for adaptive multi-model epidemic projections</title>
  <desc id="desc">Original schematic showing scenario trajectories, observed hospitalization data, particle-filter-like adaptive selection, posterior scenario probabilities, geographic scoring, and short-term forecasting outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: adaptive multi-model epidemic projections</text>
  <text x="32" y="56" class="s">Reported: U.S. Flu Scenario Modeling Hub trajectories, observed hospitalization data, adaptive ensemble selection, scenario probabilities, scoring across geographic resolutions.</text>
  <rect x="34" y="92" width="315" height="245" class="p"/><text x="56" y="122" class="h">A. Candidate trajectories</text><line x1="80" y1="278" x2="300" y2="278" class="ax"/><line x1="80" y1="278" x2="80" y2="150" class="ax"/><path d="M90 250 C130 185 180 170 288 210" stroke="#2563eb" stroke-width="2" fill="none"/><path d="M90 262 C138 230 190 206 288 246" stroke="#16a34a" stroke-width="2" fill="none"/><path d="M90 240 C138 210 178 140 288 165" stroke="#d97706" stroke-width="2" fill="none"/><text x="104" y="310" class="xs">individual model x scenario paths</text>
  <rect x="398" y="92" width="300" height="245" class="p"/><text x="420" y="122" class="h">B. Observations arrive</text><line x1="446" y1="278" x2="652" y2="278" class="ax"/><line x1="446" y1="278" x2="446" y2="150" class="ax"/><polyline points="456,260 486,250 516,230 546,212 576,205 606,218 636,240" stroke="#111827" stroke-width="3" fill="none"/><circle cx="516" cy="230" r="5" fill="#111827"/><circle cx="576" cy="205" r="5" fill="#111827"/><text x="466" y="310" class="xs">influenza hospitalization data update the ensemble</text>
  <rect x="748" y="92" width="338" height="245" class="p"/><text x="770" y="122" class="h">C. Adaptive filtering</text><rect x="786" y="156" width="256" height="112" class="b"/><text x="810" y="182" class="s">weight_mst proportional to score(y_obs,t, x_mst)</text><text x="810" y="206" class="s">select plausible trajectories</text><text x="810" y="230" class="s">update scenario probabilities</text><text x="810" y="252" class="xs">analogy reported: multi-model particle filtering</text>
  <path d="M349 216 L398 216" class="arr"/><path d="M698 216 L748 216" class="arr"/>
  <rect x="70" y="404" width="468" height="230" class="p"/><text x="92" y="434" class="h">D. Projection and forecast outputs</text><line x1="124" y1="574" x2="390" y2="574" class="ax"/><line x1="124" y1="574" x2="124" y2="472" class="ax"/><path d="M130 540 C170 500 218 490 286 512 S354 542 386 526" stroke="#16a34a" stroke-width="4" fill="none"/><path d="M130 550 C175 520 230 520 286 548 S350 585 386 560" stroke="#94a3b8" stroke-width="2" fill="none" stroke-dasharray="5 5"/><text x="154" y="602" class="xs">adaptive ensemble versus original ensemble</text><rect x="408" y="490" width="98" height="66" class="b" fill="#dcfce7"/><text x="425" y="516" class="xs">lower errors</text><text x="425" y="534" class="xs">across scores</text>
  <rect x="606" y="404" width="446" height="230" class="p"/><text x="628" y="434" class="h">E. Decision-support layers</text><rect x="648" y="476" width="160" height="54" class="b" fill="#dbeafe"/><text x="672" y="498" class="s">geographic scales</text><text x="672" y="516" class="xs">national/subnational</text><rect x="854" y="476" width="160" height="54" class="b" fill="#fef3c7"/><text x="878" y="498" class="s">scenario probabilities</text><text x="878" y="516" class="xs">most plausible path</text><rect x="754" y="556" width="160" height="54" class="b" fill="#dcfce7"/><text x="778" y="578" class="s">short-term forecasts</text><text x="778" y="596" class="xs">FluSight-style use</text>
  <text x="32" y="694" class="xs">Preprint; findings are provisional. Original schematic, not a reproduced publication figure.</text>
</svg>
