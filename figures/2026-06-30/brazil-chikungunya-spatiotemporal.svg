<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Brazil chikungunya Bayesian spatiotemporal and severity analysis</title>
  <desc id="desc">Original schematic showing Brazil municipal chikungunya data, Bayesian hierarchical spatiotemporal model, Cox severity model, demographic overlay, dual-axis municipality priority classification, and allocation estimand.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: Brazil chikungunya transmission-severity decoupling</text>
  <text x="32" y="56" class="s">Reported: SINAN confirmed cases, 5,570 municipalities, Bayesian hierarchical spatiotemporal model, Cox models, dual-axis allocation framework.</text>
  <rect x="34" y="92" width="304" height="245" class="p"/><text x="56" y="122" class="h">A. Municipal case panel</text><rect x="68" y="154" width="230" height="52" class="b" fill="#dbeafe"/><text x="88" y="178" class="s">1,235,424 confirmed cases</text><text x="88" y="196" class="xs">SINAN, 2015-2025</text><rect x="68" y="230" width="230" height="52" class="b"/><text x="88" y="254" class="s">5,570 municipalities</text><text x="88" y="272" class="xs">age, sex, hospitalization, death</text><text x="72" y="316" class="xs">2024-25 incidence rate ratios for allocation</text>
  <rect x="390" y="92" width="330" height="245" class="p"/><text x="412" y="122" class="h">B. Transmission model</text><rect x="426" y="156" width="252" height="116" class="b"/><text x="448" y="182" class="s">y_it ~ count likelihood</text><text x="448" y="206" class="s">log risk_it = alpha + S_i + T_t + ST_it</text><text x="448" y="230" class="s">+ arboviral co-circulation trend</text><text x="448" y="252" class="xs">generic notation; paper reports Bayesian hierarchy</text><text x="444" y="306" class="xs">outputs: structure, persistence, seasonality, IRRs</text>
  <rect x="772" y="92" width="314" height="245" class="p"/><text x="794" y="122" class="h">C. Severity progression</text><rect x="810" y="156" width="232" height="116" class="b" fill="#fee2e2"/><text x="832" y="182" class="s">Cox models by age and sex</text><text x="832" y="206" class="s">h(t|z)=h0(t) exp(beta z)</text><text x="832" y="230" class="xs">mortality HR rises steeply with age</text><text x="832" y="248" class="xs">males progress faster despite fewer notifications</text>
  <path d="M338 216 L390 216" class="arr"/><path d="M720 216 L772 216" class="arr"/>
  <rect x="72" y="404" width="430" height="230" class="p"/><text x="94" y="434" class="h">D. Spatial-demographic decoupling</text><rect x="118" y="476" width="148" height="90" class="b" fill="#fef3c7"/><text x="142" y="502" class="s">Central-West</text><text x="142" y="522" class="xs">high 2024-25 transmission</text><text x="142" y="542" class="xs">lower hospitalized CFR</text><rect x="316" y="476" width="148" height="90" class="b" fill="#fee2e2"/><text x="340" y="502" class="s">Southeast</text><text x="340" y="522" class="xs">older population</text><text x="340" y="542" class="xs">higher fatality burden</text><path d="M266 522 L316 522" class="arr"/>
  <rect x="574" y="404" width="478" height="230" class="p"/><text x="596" y="434" class="h">E. Dual-axis policy estimand</text><line x1="652" y1="574" x2="928" y2="574" class="ax"/><line x1="652" y1="574" x2="652" y2="476" class="ax"/><rect x="670" y="506" width="84" height="48" class="b" fill="#dbeafe"/><text x="684" y="534" class="xs">clinical</text><rect x="794" y="506" width="84" height="48" class="b" fill="#fef3c7"/><text x="808" y="534" class="xs">combined</text><rect x="794" y="574" width="84" height="32" class="b" fill="#dcfce7"/><text x="806" y="595" class="xs">transmission</text><text x="710" y="620" class="xs">recent transmission IRR</text><text x="600" y="528" class="xs" transform="rotate(-90 600 528)">share age 65+</text><text x="940" y="502" class="xs">age-only rule would miss</text><text x="940" y="520" class="xs">82% of 2024-25 cases</text>
  <text x="32" y="694" class="xs">Preprint; findings are provisional. Original schematic, not a reproduced publication figure.</text>
</svg>
