<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Korean typhoid trend, wavelet, and spatial clustering analysis</title>
  <desc id="desc">Original schematic showing surveillance data, trend models, annual wavelet periodicity, empirical Bayes smoothing, Moran and LISA cluster detection, and residual-risk outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: Korean typhoid decline, periodicity and southeastern clustering</text>
  <text x="32" y="56" class="s">Reported: 3,535 notifications from 2001-2024; domestic/imported split; trend tests; wavelet annual periodicity; Moran/LISA clustering.</text>
  <rect x="34" y="92" width="280" height="245" class="p"/><text x="56" y="122" class="h">A. Surveillance series</text><rect x="68" y="154" width="210" height="52" class="b" fill="#dbeafe"/><text x="88" y="178" class="s">weekly/annual cases y_t</text><text x="88" y="196" class="xs">2001-2024</text><rect x="68" y="230" width="210" height="52" class="b"/><text x="88" y="254" class="s">domestic + imported</text><text x="88" y="272" class="xs">484 imported reported</text><text x="74" y="316" class="xs">age strata and 16 sido units</text>
  <rect x="366" y="92" width="330" height="245" class="p"/><text x="388" y="122" class="h">B. Long-term trend</text><line x1="412" y1="282" x2="632" y2="282" class="ax"/><line x1="412" y1="282" x2="412" y2="154" class="ax"/><path d="M420 170 C472 188 515 214 562 246 S614 272 632 276" stroke="#2563eb" stroke-width="3" fill="none"/><text x="438" y="310" class="xs">Hamed-Rao MK, NB-GLM, Sen slope</text><rect x="522" y="154" width="132" height="46" class="b" fill="#dcfce7"/><text x="538" y="176" class="xs">reported decline</text><text x="538" y="192" class="xs">about -7.3%/year</text>
  <rect x="748" y="92" width="340" height="245" class="p"/><text x="770" y="122" class="h">C. Annual periodicity</text><path d="M792 238 C816 170 842 170 866 238 S920 306 944 238 S994 170 1026 238" stroke="#f59e0b" stroke-width="3" fill="none"/><line x1="792" y1="238" x2="1026" y2="238" class="ax"/><text x="812" y="288" class="s">Morlet wavelet vs AR(1) null</text><text x="812" y="308" class="xs">annual signal exceeded null by factor 2.60</text>
  <path d="M314 216 L366 216" class="arr"/><path d="M696 216 L748 216" class="arr"/>
  <rect x="74" y="404" width="440" height="230" class="p"/><text x="96" y="434" class="h">D. Spatial smoothing and weights</text><rect x="122" y="476" width="138" height="82" class="b"/><text x="144" y="504" class="s">sigungu rates</text><text x="144" y="524" class="xs">empirical Bayes</text><rect x="330" y="476" width="138" height="82" class="b"/><text x="352" y="504" class="s">sido graph W</text><text x="352" y="524" class="xs">Queen + kNN-2</text><path d="M260 518 L330 518" class="arr"/>
  <rect x="582" y="404" width="470" height="230" class="p"/><text x="604" y="434" class="h">E. Moran/LISA output</text><rect x="632" y="478" width="150" height="96" fill="#eef2ff" stroke="#475569"/><path d="M678 558 L712 510 L746 530 L762 565 Z" fill="#fee2e2" stroke="#dc2626"/><circle cx="730" cy="526" r="12" fill="#ef4444"/><text x="806" y="492" class="s">Global Moran's I = 0.403</text><text x="806" y="516" class="s">p = 0.0083</text><text x="806" y="540" class="xs">southeastern coastal corridor preserved</text><text x="806" y="558" class="xs">across weighting sensitivity checks</text>
  <text x="32" y="694" class="xs">Original schematic, not a reproduced publication figure.</text>
</svg>
