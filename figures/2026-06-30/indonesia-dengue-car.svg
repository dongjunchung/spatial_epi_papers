<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for Indonesian dengue Bayesian CAR mapping</title>
  <desc id="desc">Original schematic showing province-level dengue counts, population offsets, covariates, adjacency matrix, BYM and Leroux CAR priors, MCMC fitting, DIC and WAIC model comparison, and risk maps.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: Bayesian CAR mapping of dengue in Indonesia</text>
  <text x="32" y="56" class="s">Reported: 2023 province-level DHF counts, population offsets, temperature and public-health-worker predictors, BYM and Leroux CAR Poisson models.</text>
  <rect x="34" y="92" width="300" height="245" class="p"/><text x="56" y="122" class="h">A. Areal data</text><rect x="70" y="154" width="220" height="48" class="b" fill="#dbeafe"/><text x="90" y="178" class="s">DHF counts y_i</text><text x="90" y="196" class="xs">province i, 2023</text><rect x="70" y="222" width="220" height="48" class="b"/><text x="90" y="246" class="s">population offset E_i</text><rect x="70" y="292" width="98" height="30" class="b" fill="#dcfce7"/><text x="82" y="311" class="xs">temperature</text><rect x="190" y="292" width="100" height="30" class="b" fill="#dcfce7"/><text x="202" y="311" class="xs">health staff</text>
  <rect x="386" y="92" width="300" height="245" class="p"/><text x="408" y="122" class="h">B. Spatial dependence</text><circle cx="482" cy="190" r="22" fill="#dbeafe" stroke="#2563eb"/><circle cx="562" cy="170" r="22" fill="#dbeafe" stroke="#2563eb"/><circle cx="594" cy="248" r="22" fill="#fee2e2" stroke="#dc2626"/><circle cx="500" cy="262" r="22" fill="#dbeafe" stroke="#2563eb"/><line x1="504" y1="185" x2="540" y2="175" stroke="#475569" stroke-width="2"/><line x1="570" y1="192" x2="586" y2="226" stroke="#475569" stroke-width="2"/><line x1="522" y1="256" x2="572" y2="250" stroke="#475569" stroke-width="2"/><line x1="490" y1="212" x2="498" y2="240" stroke="#475569" stroke-width="2"/><text x="424" y="306" class="s">Moran's I = 0.4689; p = 0.021</text>
  <rect x="738" y="92" width="350" height="245" class="p"/><text x="760" y="122" class="h">C. CAR likelihood</text><rect x="774" y="156" width="280" height="118" class="b"/><text x="798" y="182" class="s">y_i ~ Poisson(mu_i)</text><text x="798" y="206" class="s">log mu_i = log E_i + beta x_i + u_i</text><text x="798" y="230" class="s">BYM: u_i = spatial_i + iid_i</text><text x="798" y="252" class="s">Leroux: u | W, rho, tau</text><text x="790" y="306" class="xs">generic notation; exact parameterization may differ</text>
  <path d="M334 216 L386 216" class="arr"/><path d="M686 216 L738 216" class="arr"/>
  <rect x="86" y="404" width="440" height="230" class="p"/><text x="108" y="434" class="h">D. Inference and comparison</text><rect x="128" y="480" width="140" height="68" class="b"/><text x="160" y="508" class="s">MCMC</text><text x="148" y="528" class="xs">posterior samples</text><rect x="332" y="480" width="140" height="68" class="b" fill="#fef3c7"/><text x="364" y="508" class="s">DIC + WAIC</text><text x="354" y="528" class="xs">BYM marginally better</text><path d="M268 514 L332 514" class="arr"/>
  <rect x="596" y="404" width="438" height="230" class="p"/><text x="618" y="434" class="h">E. Posterior risk maps</text><rect x="646" y="478" width="162" height="96" fill="#eff6ff" stroke="#475569"/><path d="M672 540 L708 502 L744 522 L780 486 L796 562 Z" fill="#fde68a" stroke="#ca8a04"/><circle cx="768" cy="505" r="9" fill="#ef4444"/><circle cx="736" cy="530" r="7" fill="#f97316"/><text x="832" y="492" class="s">Elevated burden:</text><text x="832" y="514" class="s">Kalimantan and eastern Indonesia</text><text x="832" y="546" class="xs">workforce association may reflect</text><text x="832" y="564" class="xs">reporting capacity or deployment</text>
  <text x="32" y="694" class="xs">Original schematic, not a reproduced publication figure.</text>
</svg>
