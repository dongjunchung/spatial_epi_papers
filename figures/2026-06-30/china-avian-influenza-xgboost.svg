<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" role="img" aria-labelledby="title desc">
  <title id="title">Original technical schematic for poultry avian influenza spatiotemporal XGBoost analysis</title>
  <desc id="desc">Original schematic showing poultry avian influenza case inputs, subtype maps, covariate layers, XGBoost driver attribution, interaction effects, and surveillance outputs.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#334155"/></marker><style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.h{font-weight:700;font-size:20px}.s{font-size:14px}.xs{font-size:12px}.p{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.4;rx:8}.b{fill:#fff;stroke:#64748b;stroke-width:1.2;rx:6}.arr{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a)}.ax{stroke:#475569;stroke-width:1.2;fill:none}</style></defs>
  <rect width="1120" height="720" fill="#fff"/>
  <text x="32" y="34" class="h">Original technical schematic: poultry avian influenza in China</text>
  <text x="32" y="56" class="s">Reported: 2010-2025 poultry AI cases, H5/H7/H9 space-time trends, hotspot mapping, XGBoost driver attribution and interactions.</text>
  <rect x="32" y="92" width="244" height="235" class="p"/><text x="52" y="122" class="h">A. Case database</text>
  <rect x="62" y="150" width="180" height="48" class="b" fill="#dbeafe"/><text x="82" y="171" class="s">case y_i,t,k</text><text x="82" y="189" class="xs">location, month, subtype</text>
  <rect x="62" y="220" width="180" height="48" class="b"/><text x="82" y="241" class="s">subtype labels</text><text x="82" y="259" class="xs">H5, H7, H9; H9N2</text>
  <rect x="62" y="288" width="180" height="26" class="b"/><text x="82" y="306" class="xs">winter emphasis: Nov-Mar</text>
  <rect x="322" y="92" width="350" height="235" class="p"/><text x="342" y="122" class="h">B. Space-time patterns</text>
  <rect x="352" y="150" width="135" height="128" fill="#eef2ff" stroke="#475569"/><path d="M378 254 L410 214 L442 228 L466 188 L480 256 Z" fill="#fecaca" stroke="#dc2626"/><circle cx="452" cy="206" r="10" fill="#ef4444"/><circle cx="424" cy="232" r="8" fill="#f97316"/>
  <text x="504" y="166" class="s">Reported summaries</text><text x="504" y="194" class="xs">hotspots: southeastern China</text><text x="504" y="218" class="xs">H5 persisted, shifted eastward</text><text x="504" y="242" class="xs">H7/H9 showed different trends</text><text x="504" y="266" class="xs">H9N2 had most reported cases</text>
  <rect x="718" y="92" width="370" height="235" class="p"/><text x="738" y="122" class="h">C. Covariate layers</text>
  <rect x="748" y="150" width="138" height="55" class="b" fill="#dcfce7"/><text x="766" y="174" class="s">human activity</text><text x="766" y="192" class="xs">roads, pop, GDP, trade</text>
  <rect x="918" y="150" width="138" height="55" class="b" fill="#fef3c7"/><text x="936" y="174" class="s">climate</text><text x="936" y="192" class="xs">winter precip., temp.</text>
  <rect x="748" y="238" width="138" height="55" class="b" fill="#fee2e2"/><text x="766" y="262" class="s">farming density</text><text x="766" y="280" class="xs">chicken, duck, pig</text>
  <rect x="918" y="238" width="138" height="55" class="b" fill="#dbeafe"/><text x="936" y="262" class="s">waterfowl/habitat</text><text x="936" y="280" class="xs">wetland, NDVI, elevation</text>
  <path d="M276 210 L322 210" class="arr"/><path d="M672 210 L718 210" class="arr"/>
  <rect x="76" y="398" width="300" height="230" class="p"/><text x="96" y="428" class="h">D. XGBoost model</text><rect x="116" y="466" width="220" height="70" class="b"/><text x="138" y="492" class="s">risk_i = f(x_i1,...,x_ip)</text><text x="138" y="514" class="xs">generic notation; paper reports XGBoost</text><rect x="116" y="558" width="220" height="42" class="b" fill="#dcfce7"/><text x="138" y="584" class="s">importance + thresholds</text>
  <rect x="444" y="398" width="292" height="230" class="p"/><text x="464" y="428" class="h">E. Interactions</text><line x1="494" y1="584" x2="674" y2="584" class="ax"/><line x1="494" y1="584" x2="494" y2="468" class="ax"/><path d="M504 560 C545 500 588 505 660 470" stroke="#16a34a" stroke-width="3" fill="none"/><path d="M504 570 C552 540 610 555 668 520" stroke="#f59e0b" stroke-width="3" fill="none"/><text x="518" y="612" class="xs">driver level</text><text x="520" y="486" class="xs">trade + farming + waterfowl amplify risk</text>
  <rect x="804" y="398" width="260" height="230" class="p"/><text x="824" y="428" class="h">F. Outputs</text><rect x="838" y="470" width="190" height="38" class="b" fill="#fee2e2"/><text x="858" y="494" class="s">hotspot maps</text><rect x="838" y="528" width="190" height="38" class="b" fill="#fef3c7"/><text x="858" y="552" class="s">driver rankings</text><rect x="838" y="586" width="190" height="38" class="b" fill="#dcfce7"/><text x="858" y="610" class="s">targeted surveillance</text>
  <text x="32" y="694" class="xs">Original schematic, not a reproduced publication figure. Equation notation is explanatory and may differ from the paper.</text>
</svg>
